<!doctype html>
<html lang="de" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>HL7 Parser</title>
    <style>
      /* ─── Reset ─────────────────────────────────────────────────── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      /* ─── Design Tokens: Dark (default) ─────────────────────────── */
      :root,
      [data-theme="dark"] {
        color-scheme: dark;

        --bg: #08080c;
        --bg-grad: radial-gradient(
            1200px 600px at 15% -10%,
            rgba(99, 102, 241, 0.08),
            transparent 60%
          ),
          radial-gradient(
            900px 500px at 100% 0%,
            rgba(14, 165, 233, 0.05),
            transparent 55%
          ),
          #08080c;

        --surface: #101016;
        --surface-2: #15151d;
        --surface-3: #1b1b25;

        --border: #23232f;
        --border-soft: #1a1a24;
        --border-strong: #2e2e3d;

        --text: #eceef5;
        --text-muted: #8d8fa8;
        --text-dim: #54566c;

        --accent: #7c7dff;
        --accent-fg: #ffffff;
        --accent-soft: rgba(124, 125, 255, 0.12);
        --accent-ring: rgba(124, 125, 255, 0.35);

        --success: #34d399;
        --warning: #f59e0b;
        --danger: #f87171;

        /* Segment category palette — backgrounds + foregrounds */
        --cat-control-bg: #172344;
        --cat-control-fg: #8ab4ff;

        --cat-patient-bg: #11331f;
        --cat-patient-fg: #4ade80;

        --cat-visit-bg: #3a2614;
        --cat-visit-fg: #fdba74;

        --cat-allergy-bg: #3a2a10;
        --cat-allergy-fg: #fcd34d;

        --cat-observation-bg: #0e2f33;
        --cat-observation-fg: #22d3ee;

        --cat-order-bg: #1a1e4a;
        --cat-order-fg: #a5b4fc;

        --cat-diagnosis-bg: #0e3634;
        --cat-diagnosis-fg: #2dd4bf;

        --cat-scheduling-bg: #103232;
        --cat-scheduling-fg: #5eead4;

        --cat-notes-bg: #251a40;
        --cat-notes-fg: #c4b5fd;

        --cat-insurance-bg: #3a1431;
        --cat-insurance-fg: #f0abfc;

        --cat-error-bg: #3a1414;
        --cat-error-fg: #fca5a5;

        --cat-z-bg: #2a1648;
        --cat-z-fg: #d8b4fe;

        --cat-unknown-bg: #1d1d28;
        --cat-unknown-fg: #8d8fa8;

        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.5);
        --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.35);
        --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.5);

        --r-sm: 4px;
        --r-md: 7px;
        --r-lg: 10px;
        --r-xl: 14px;

        --ease: cubic-bezier(0.2, 0, 0, 1);
        --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        --dur-1: 0.12s;
        --dur-2: 0.22s;
        --dur-3: 0.35s;
      }

      /* ─── Design Tokens: Light ───────────────────────────────────── */
      [data-theme="light"] {
        color-scheme: light;

        --bg: #f6f7fb;
        --bg-grad: radial-gradient(
            1200px 600px at 15% -10%,
            rgba(99, 102, 241, 0.08),
            transparent 60%
          ),
          radial-gradient(
            900px 500px at 100% 0%,
            rgba(14, 165, 233, 0.05),
            transparent 55%
          ),
          #f6f7fb;

        --surface: #ffffff;
        --surface-2: #f1f2f8;
        --surface-3: #e8eaf2;

        --border: #e1e3ee;
        --border-soft: #ecedf4;
        --border-strong: #c8cbdb;

        --text: #0d0e1a;
        --text-muted: #5a5d78;
        --text-dim: #9598b0;

        --accent: #4f46e5;
        --accent-fg: #ffffff;
        --accent-soft: rgba(79, 70, 229, 0.08);
        --accent-ring: rgba(79, 70, 229, 0.28);

        --success: #059669;
        --warning: #b45309;
        --danger: #dc2626;

        --cat-control-bg: #dbeafe;
        --cat-control-fg: #1d4ed8;

        --cat-patient-bg: #dcfce7;
        --cat-patient-fg: #15803d;

        --cat-visit-bg: #ffedd5;
        --cat-visit-fg: #c2410c;

        --cat-allergy-bg: #fef3c7;
        --cat-allergy-fg: #92400e;

        --cat-observation-bg: #cffafe;
        --cat-observation-fg: #0e7490;

        --cat-order-bg: #e0e7ff;
        --cat-order-fg: #4338ca;

        --cat-diagnosis-bg: #ccfbf1;
        --cat-diagnosis-fg: #0f766e;

        --cat-scheduling-bg: #ccfbf1;
        --cat-scheduling-fg: #0f766e;

        --cat-notes-bg: #f3e8ff;
        --cat-notes-fg: #6b21a8;

        --cat-insurance-bg: #fce7f3;
        --cat-insurance-fg: #9d174d;

        --cat-error-bg: #fee2e2;
        --cat-error-fg: #b91c1c;

        --cat-z-bg: #f3e8ff;
        --cat-z-fg: #7e22ce;

        --cat-unknown-bg: #eaecf3;
        --cat-unknown-fg: #5a5d78;

        --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.06);
        --shadow-md: 0 4px 16px rgba(15, 23, 42, 0.08);
        --shadow-lg: 0 12px 32px rgba(15, 23, 42, 0.1);
      }

      /* ─── Base ───────────────────────────────────────────────────── */
      html,
      body {
        height: 100%;
      }

      body {
        font-family:
          "Inter Variable",
          "Inter",
          "Segoe UI Variable",
          "Segoe UI",
          system-ui,
          -apple-system,
          "Helvetica Neue",
          sans-serif;
        font-feature-settings:
          "cv11",
          "ss01",
          "ss03";
        background: var(--bg-grad);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        font-size: 13px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }

      ::selection {
        background: var(--accent-soft);
        color: var(--text);
      }

      :focus-visible {
        outline: none;
        box-shadow: 0 0 0 3px var(--accent-ring);
        border-radius: var(--r-sm);
      }

      /* ─── Scrollbars ─────────────────────────────────────────────── */
      * {
        scrollbar-width: thin;
        scrollbar-color: var(--border-strong) transparent;
      }
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 4px;
        border: 2px solid transparent;
        background-clip: padding-box;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--border-strong);
        background-clip: padding-box;
        border: 2px solid transparent;
      }

      /* ─── Header ─────────────────────────────────────────────────── */
      header {
        height: 52px;
        min-height: 52px;
        background: color-mix(in srgb, var(--surface) 85%, transparent);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border);
        padding: 0 1.125rem;
        display: flex;
        align-items: center;
        gap: 0.625rem;
        flex-shrink: 0;
        position: relative;
        z-index: 10;
      }

      .logo-mark {
        width: 26px;
        height: 26px;
        background: linear-gradient(135deg, var(--accent), #a855f7);
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        box-shadow:
          0 0 0 1px color-mix(in srgb, var(--accent) 30%, transparent),
          0 8px 24px -8px var(--accent);
      }
      .logo-mark svg {
        width: 14px;
        height: 14px;
      }

      header h1 {
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--text);
        letter-spacing: -0.015em;
      }

      .badge {
        font-size: 0.62rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-muted);
        background: var(--surface-2);
        border: 1px solid var(--border);
        padding: 0.16rem 0.45rem;
        border-radius: 4px;
      }

      .header-spacer {
        flex: 1;
      }

      .header-hint {
        font-size: 0.72rem;
        color: var(--text-dim);
        display: none;
      }
      .header-hint kbd {
        font-family: inherit;
        font-size: 0.68rem;
        padding: 0.08rem 0.35rem;
        border: 1px solid var(--border);
        border-radius: 3px;
        background: var(--surface-2);
        color: var(--text-muted);
        margin: 0 0.1rem;
      }
      @media (min-width: 720px) {
        .header-hint {
          display: inline-flex;
          align-items: center;
          gap: 0.35rem;
        }
      }

      /* ─── Icon Button ────────────────────────────────────────────── */
      .icon-button {
        width: 32px;
        height: 32px;
        border-radius: var(--r-md);
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-muted);
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition:
          color var(--dur-2) var(--ease),
          border-color var(--dur-2) var(--ease),
          background var(--dur-2) var(--ease),
          transform var(--dur-2) var(--ease);
        padding: 0;
        flex-shrink: 0;
      }
      .icon-button:hover {
        color: var(--text);
        border-color: var(--border-strong);
        background: var(--surface-2);
      }
      .icon-button:active {
        transform: scale(0.96);
      }
      .icon-button svg {
        width: 15px;
        height: 15px;
      }

      [data-theme="dark"] .icon-sun {
        display: block;
      }
      [data-theme="dark"] .icon-moon {
        display: none;
      }
      [data-theme="light"] .icon-sun {
        display: none;
      }
      [data-theme="light"] .icon-moon {
        display: block;
      }

      /* ─── Layout ─────────────────────────────────────────────────── */
      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        height: calc(100vh - 52px);
        padding: 0.625rem;
        gap: 0.625rem;
      }

      /* ─── Panel ──────────────────────────────────────────────────── */
      .panel {
        display: flex;
        flex-direction: column;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r-lg);
        overflow: hidden;
        box-shadow: var(--shadow-sm);
      }

      .panel-input {
        height: 30vh;
        min-height: 140px;
        max-height: 50vh;
        resize: vertical;
        flex-shrink: 0;
      }

      .panel-output {
        flex: 1;
        min-height: 0;
      }

      .panel-bar {
        height: 42px;
        min-height: 42px;
        padding: 0 0.75rem;
        background: var(--surface-2);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 0.4rem;
        flex-shrink: 0;
        overflow: hidden;
      }

      .panel-label {
        font-size: 0.66rem;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-muted);
        white-space: nowrap;
        margin-right: 0.2rem;
      }

      .bar-sep {
        width: 1px;
        height: 16px;
        background: var(--border);
        flex-shrink: 0;
        margin: 0 0.15rem;
      }

      .spacer {
        flex: 1;
      }

      /* ─── Buttons ────────────────────────────────────────────────── */
      button {
        cursor: pointer;
        border: none;
        font-family: inherit;
        font-weight: 500;
        font-size: 0.75rem;
        border-radius: var(--r-sm);
        padding: 0.32rem 0.7rem;
        transition:
          background var(--dur-1) var(--ease),
          color var(--dur-1) var(--ease),
          border-color var(--dur-1) var(--ease),
          box-shadow var(--dur-2) var(--ease),
          transform var(--dur-1) var(--ease);
        white-space: nowrap;
        line-height: 1.4;
      }
      button:active {
        transform: translateY(0.5px);
      }

      .btn-primary {
        background: var(--accent);
        color: var(--accent-fg);
        padding: 0.34rem 0.9rem;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.12),
          0 1px 2px rgba(0, 0, 0, 0.15),
          0 0 0 0 var(--accent-ring);
      }
      .btn-primary:hover {
        filter: brightness(1.08);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.12),
          0 2px 8px color-mix(in srgb, var(--accent) 40%, transparent);
      }

      .btn-ghost {
        background: transparent;
        color: var(--text-muted);
        border: 1px solid var(--border);
      }
      .btn-ghost:hover {
        color: var(--text);
        border-color: var(--border-strong);
        background: var(--surface-2);
      }

      .sample-btn {
        background: transparent;
        color: var(--text-muted);
        border: 1px solid var(--border);
        font-size: 0.7rem;
        padding: 0.26rem 0.6rem;
        font-family: var(--font-mono);
        letter-spacing: 0.05em;
        font-weight: 600;
      }
      .sample-btn:hover {
        color: var(--accent);
        border-color: color-mix(in srgb, var(--accent) 50%, var(--border));
        background: var(--accent-soft);
      }

      /* ─── Textarea ───────────────────────────────────────────────── */
      :root {
        --font-mono:
          "JetBrains Mono", "Cascadia Code", "SF Mono", "Fira Code", "Consolas",
          ui-monospace, monospace;
      }

      textarea {
        flex: 1;
        background: transparent;
        color: var(--text);
        border: none;
        outline: none;
        resize: none;
        padding: 0.9rem 1rem;
        font-family: var(--font-mono);
        font-size: 0.8rem;
        line-height: 1.65;
        tab-size: 4;
        width: 100%;
        min-height: 0;
      }
      textarea::placeholder {
        color: var(--text-dim);
      }

      /* ─── Output Body ────────────────────────────────────────────── */
      .output-body {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding: 0.75rem 0.875rem;
      }

      /* ─── Empty State ────────────────────────────────────────────── */
      .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        text-align: center;
        padding: 4rem 2rem;
        animation: fade-in var(--dur-3) var(--ease-out);
      }

      .empty-icon {
        width: 56px;
        height: 56px;
        border-radius: var(--r-xl);
        background: linear-gradient(
          135deg,
          var(--surface-2),
          var(--surface-3)
        );
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: var(--shadow-sm);
      }
      .empty-icon svg {
        width: 26px;
        height: 26px;
        color: var(--text-dim);
      }

      .empty-state p {
        font-size: 0.85rem;
        color: var(--text-muted);
        max-width: 320px;
        line-height: 1.6;
      }
      .empty-state strong {
        color: var(--text);
        font-weight: 600;
      }
      .empty-hint {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        font-size: 0.72rem;
        color: var(--text-dim);
        margin-top: 0.15rem;
      }
      .empty-hint kbd {
        font-family: inherit;
        font-size: 0.68rem;
        padding: 0.08rem 0.35rem;
        border: 1px solid var(--border);
        border-radius: 3px;
        background: var(--surface-2);
        color: var(--text-muted);
      }

      /* ─── Segment Index ──────────────────────────────────────────── */
      .seg-index {
        padding: 0.5rem 0.875rem;
        background: var(--surface-2);
        border-bottom: 1px solid var(--border);
        display: flex;
        flex-wrap: wrap;
        gap: 0.3rem;
        align-items: center;
      }

      .seg-pill {
        font-size: 0.68rem;
        font-weight: 700;
        padding: 0.2rem 0.5rem;
        border-radius: var(--r-sm);
        cursor: pointer;
        font-family: var(--font-mono);
        border: 1px solid transparent;
        transition:
          transform var(--dur-1) var(--ease),
          box-shadow var(--dur-1) var(--ease),
          opacity var(--dur-1) var(--ease);
        display: inline-flex;
        align-items: center;
        gap: 0.22rem;
        letter-spacing: 0.03em;
      }
      .seg-pill:hover {
        transform: translateY(-1px);
        box-shadow: var(--shadow-sm);
      }
      .seg-pill:active {
        transform: translateY(0);
      }

      .pill-count {
        font-size: 0.58rem;
        background: rgba(0, 0, 0, 0.2);
        padding: 0.04rem 0.28rem;
        border-radius: 2px;
        font-weight: 600;
      }
      [data-theme="light"] .pill-count {
        background: rgba(0, 0, 0, 0.08);
      }

      /* ─── Stats Bar ──────────────────────────────────────────────── */
      .stats-bar {
        display: flex;
        gap: 0.9rem;
        align-items: center;
        font-size: 0.72rem;
        color: var(--text-muted);
      }
      .stat-item {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        font-variant-numeric: tabular-nums;
      }
      .stat-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--accent);
        flex-shrink: 0;
        box-shadow: 0 0 8px currentColor;
        color: var(--accent);
      }
      .stat-dot.stat-success {
        background: var(--success);
        color: var(--success);
      }
      .stat-value {
        font-weight: 600;
        color: var(--text);
      }

      /* ─── Search ─────────────────────────────────────────────────── */
      .search-wrap {
        position: relative;
        display: flex;
        align-items: center;
      }

      .search-input {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--r-sm);
        color: var(--text);
        font-size: 0.76rem;
        padding: 0.3rem 1.8rem 0.3rem 1.7rem;
        outline: none;
        width: 180px;
        transition:
          border-color var(--dur-2) var(--ease),
          box-shadow var(--dur-2) var(--ease);
        font-family: inherit;
      }
      .search-input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-ring);
      }
      .search-input::placeholder {
        color: var(--text-dim);
      }

      .search-icon {
        position: absolute;
        left: 0.5rem;
        color: var(--text-muted);
        pointer-events: none;
        line-height: 0;
        display: flex;
      }
      .search-icon svg {
        width: 12px;
        height: 12px;
      }

      .search-clear {
        position: absolute;
        right: 0.3rem;
        background: transparent;
        border: none;
        color: var(--text-dim);
        cursor: pointer;
        padding: 0.2rem;
        border-radius: 3px;
        display: none;
        line-height: 0;
      }
      .search-clear svg {
        width: 11px;
        height: 11px;
      }
      .search-wrap.has-value .search-clear {
        display: flex;
      }
      .search-clear:hover {
        color: var(--text);
        background: var(--surface-3);
      }

      /* ─── Segment Card ───────────────────────────────────────────── */
      .segment-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r-md);
        overflow: hidden;
        margin-bottom: 0.55rem;
        transition:
          border-color var(--dur-2) var(--ease),
          box-shadow var(--dur-2) var(--ease);
        animation: card-enter var(--dur-3) var(--ease-out) backwards;
      }
      .segment-card:last-child {
        margin-bottom: 0;
      }
      .segment-card:hover {
        border-color: var(--border-strong);
      }

      @keyframes card-enter {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .segment-header {
        display: flex;
        align-items: center;
        gap: 0.65rem;
        padding: 0.55rem 0.75rem;
        background: var(--surface-2);
        cursor: pointer;
        user-select: none;
        border-bottom: 1px solid var(--border);
        transition: background var(--dur-1) var(--ease);
      }
      .segment-header:hover {
        background: var(--surface-3);
      }

      /* ─── Segment Tag (category-driven) ──────────────────────────── */
      .seg-tag {
        font-family: var(--font-mono);
        font-size: 0.74rem;
        font-weight: 700;
        padding: 0.22rem 0.5rem;
        border-radius: var(--r-sm);
        min-width: 3.1rem;
        text-align: center;
        letter-spacing: 0.03em;
        background: var(--cat-unknown-bg);
        color: var(--cat-unknown-fg);
        flex-shrink: 0;
      }

      .seg-tag[data-cat="control"],
      .seg-pill[data-cat="control"] {
        background: var(--cat-control-bg);
        color: var(--cat-control-fg);
      }
      .seg-tag[data-cat="patient"],
      .seg-pill[data-cat="patient"] {
        background: var(--cat-patient-bg);
        color: var(--cat-patient-fg);
      }
      .seg-tag[data-cat="visit"],
      .seg-pill[data-cat="visit"] {
        background: var(--cat-visit-bg);
        color: var(--cat-visit-fg);
      }
      .seg-tag[data-cat="allergy"],
      .seg-pill[data-cat="allergy"] {
        background: var(--cat-allergy-bg);
        color: var(--cat-allergy-fg);
      }
      .seg-tag[data-cat="observation"],
      .seg-pill[data-cat="observation"] {
        background: var(--cat-observation-bg);
        color: var(--cat-observation-fg);
      }
      .seg-tag[data-cat="order"],
      .seg-pill[data-cat="order"] {
        background: var(--cat-order-bg);
        color: var(--cat-order-fg);
      }
      .seg-tag[data-cat="diagnosis"],
      .seg-pill[data-cat="diagnosis"] {
        background: var(--cat-diagnosis-bg);
        color: var(--cat-diagnosis-fg);
      }
      .seg-tag[data-cat="scheduling"],
      .seg-pill[data-cat="scheduling"] {
        background: var(--cat-scheduling-bg);
        color: var(--cat-scheduling-fg);
      }
      .seg-tag[data-cat="notes"],
      .seg-pill[data-cat="notes"] {
        background: var(--cat-notes-bg);
        color: var(--cat-notes-fg);
      }
      .seg-tag[data-cat="insurance"],
      .seg-pill[data-cat="insurance"] {
        background: var(--cat-insurance-bg);
        color: var(--cat-insurance-fg);
      }
      .seg-tag[data-cat="error"],
      .seg-pill[data-cat="error"] {
        background: var(--cat-error-bg);
        color: var(--cat-error-fg);
      }
      .seg-tag[data-cat="z"],
      .seg-pill[data-cat="z"] {
        background: var(--cat-z-bg);
        color: var(--cat-z-fg);
      }

      .seg-name {
        font-size: 0.82rem;
        font-weight: 500;
        flex: 1;
        color: var(--text);
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .seg-count {
        font-size: 0.7rem;
        color: var(--text-muted);
        white-space: nowrap;
        font-variant-numeric: tabular-nums;
      }

      .seg-header-actions {
        display: flex;
        align-items: center;
        gap: 0.25rem;
      }

      .btn-icon {
        background: transparent;
        border: 1px solid transparent;
        border-radius: var(--r-sm);
        color: var(--text-muted);
        padding: 0.26rem 0.3rem;
        cursor: pointer;
        transition: all var(--dur-1) var(--ease);
        line-height: 0;
        display: inline-flex;
        align-items: center;
      }
      .btn-icon svg {
        width: 13px;
        height: 13px;
      }
      .btn-icon:hover {
        border-color: var(--border);
        color: var(--text);
        background: var(--bg);
      }
      .btn-icon.active {
        color: var(--accent);
        border-color: color-mix(in srgb, var(--accent) 40%, var(--border));
        background: var(--accent-soft);
      }

      .chevron {
        color: var(--text-muted);
        transition: transform var(--dur-2) var(--ease);
        line-height: 0;
        display: inline-flex;
        align-items: center;
        flex-shrink: 0;
      }
      .chevron svg {
        width: 13px;
        height: 13px;
      }
      .segment-card.collapsed .chevron {
        transform: rotate(-90deg);
      }
      .segment-card.collapsed .segment-body {
        display: none;
      }

      /* ─── Raw Line ───────────────────────────────────────────────── */
      .raw-line {
        font-family: var(--font-mono);
        font-size: 0.7rem;
        color: var(--text-muted);
        background: var(--bg);
        padding: 0.5rem 0.75rem;
        border-top: 1px solid var(--border);
        word-break: break-all;
        overflow-wrap: anywhere;
        display: none;
        line-height: 1.6;
      }
      .raw-line.visible {
        display: block;
      }

      /* ─── Field Rows ─────────────────────────────────────────────── */
      .field-row {
        display: grid;
        grid-template-columns: 2.5rem minmax(180px, 260px) 1fr;
        gap: 0;
        border-bottom: 1px solid var(--border-soft);
        font-size: 0.78rem;
        align-items: stretch;
        min-width: 0;
      }
      .field-row:last-of-type {
        border-bottom: none;
      }
      .field-row.hidden {
        display: none;
      }
      .field-row.has-value {
        transition: background var(--dur-1) var(--ease);
      }
      .field-row.has-value:hover {
        background: var(--accent-soft);
      }
      .field-row.has-value:hover .copy-btn {
        opacity: 1;
      }

      .field-num {
        padding: 0.5rem 0.4rem;
        color: var(--text-dim);
        font-family: var(--font-mono);
        font-size: 0.68rem;
        text-align: center;
        background: var(--surface-2);
        display: flex;
        align-items: center;
        justify-content: center;
        border-right: 1px solid var(--border-soft);
        flex-shrink: 0;
        font-variant-numeric: tabular-nums;
      }

      .field-name {
        padding: 0.5rem 0.7rem;
        color: var(--text-muted);
        border-right: 1px solid var(--border-soft);
        font-size: 0.81rem;
        display: flex;
        align-items: center;
        line-height: 1.4;
        word-break: break-word;
        min-width: 0;
      }

      .field-value {
        padding: 0.5rem 0.7rem;
        font-family: var(--font-mono);
        font-size: 0.81rem;
        word-break: break-all;
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 0.22rem;
        min-width: 0;
        overflow-wrap: anywhere;
        position: relative;
        color: var(--text);
      }
      .field-value.empty {
        color: var(--text-dim);
        font-style: italic;
        font-family: inherit;
        font-size: 0.74rem;
      }

      /* ─── Copy Button ────────────────────────────────────────────── */
      .copy-btn {
        position: absolute;
        right: 0.4rem;
        top: 50%;
        transform: translateY(-50%);
        opacity: 0;
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: var(--r-sm);
        color: var(--text-muted);
        padding: 0.22rem 0.32rem;
        cursor: pointer;
        transition: all var(--dur-1) var(--ease);
        line-height: 0;
        display: inline-flex;
        align-items: center;
      }
      .copy-btn svg {
        width: 11px;
        height: 11px;
      }
      .copy-btn:hover {
        color: var(--text);
        border-color: var(--accent);
        background: var(--accent-soft);
      }
      .copy-btn.copied {
        color: var(--success);
        border-color: var(--success);
        opacity: 1;
      }

      /* ─── Components ─────────────────────────────────────────────── */
      .component {
        display: inline-flex;
        align-items: center;
        gap: 0.2rem;
      }
      .component-sep {
        color: var(--border-strong);
        font-size: 0.9em;
      }
      .component-val {
        color: var(--text);
      }

      .component-label {
        font-size: 0.62rem;
        color: var(--text-muted);
        background: var(--surface-2);
        border: 1px solid var(--border-soft);
        padding: 0.04rem 0.3rem;
        border-radius: 3px;
        font-family: inherit;
        font-weight: 500;
      }

      .repeat-group {
        display: flex;
        flex-direction: column;
        gap: 0.2rem;
        width: 100%;
      }
      .repeat-item {
        display: flex;
        align-items: center;
        gap: 0.35rem;
      }

      .repeat-badge {
        font-size: 0.6rem;
        color: var(--text-muted);
        background: var(--surface-2);
        border: 1px solid var(--border);
        padding: 0.08rem 0.32rem;
        border-radius: 3px;
        white-space: nowrap;
        font-family: var(--font-mono);
        font-weight: 600;
        flex-shrink: 0;
      }

      /* ─── Error Box ──────────────────────────────────────────────── */
      .error-box {
        background: color-mix(in srgb, var(--danger) 8%, var(--surface));
        border: 1px solid color-mix(in srgb, var(--danger) 30%, var(--border));
        border-radius: var(--r-md);
        padding: 0.85rem 1rem;
        color: var(--danger);
        font-size: 0.82rem;
        display: flex;
        align-items: center;
        gap: 0.6rem;
        animation: fade-in var(--dur-3) var(--ease-out);
      }
      .error-box svg {
        flex-shrink: 0;
        width: 16px;
        height: 16px;
      }

      /* ─── Toast ──────────────────────────────────────────────────── */
      .toast {
        position: fixed;
        bottom: 1.25rem;
        right: 1.25rem;
        background: var(--surface);
        border: 1px solid var(--success);
        color: var(--success);
        font-size: 0.78rem;
        font-weight: 500;
        padding: 0.5rem 0.9rem;
        border-radius: var(--r-md);
        opacity: 0;
        transform: translateY(8px);
        transition:
          opacity var(--dur-2) var(--ease-out),
          transform var(--dur-2) var(--ease-out);
        pointer-events: none;
        z-index: 100;
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        box-shadow: var(--shadow-md);
      }
      .toast svg {
        width: 14px;
        height: 14px;
      }
      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }

      /* ─── Animations ─────────────────────────────────────────────── */
      @keyframes fade-in {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          transition-duration: 0.01ms !important;
        }
      }

      /* ─── Responsive ─────────────────────────────────────────────── */
      @media (max-width: 640px) {
        .main {
          padding: 0.5rem;
          gap: 0.5rem;
        }
        .panel-input {
          height: 35vh;
        }
        .field-row {
          grid-template-columns: 2rem minmax(110px, 150px) 1fr;
          font-size: 0.74rem;
        }
        .search-input {
          width: 130px;
        }
        .panel-bar {
          gap: 0.3rem;
          padding: 0 0.5rem;
        }
        .badge {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo-mark" aria-hidden="true">
        <svg viewBox="0 0 12 12" fill="white" xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="1.5" width="10" height="1.6" rx="0.4" />
          <rect x="1" y="5.2" width="7" height="1.6" rx="0.4" />
          <rect x="1" y="8.9" width="8.5" height="1.6" rx="0.4" />
        </svg>
      </div>
      <h1>HL7 Parser</h1>
      <span class="badge">v2.5</span>

      <div class="header-spacer"></div>

      <span class="header-hint" aria-hidden="true">
        <kbd>Ctrl</kbd><kbd>Enter</kbd> Parsen
      </span>

      <button

          <line x1="2.5" y1="10" x2="4.5" y2="10" />
          <line x1="15.5" y1="10" x2="17.5" y2="10" />
          <line x1="4.9" y1="4.9" x2="6.3" y2="6.3" />

    </header>

    <div class="main">
      <!-- Input Panel -->
      <div class="panel panel-input">
        <div class="panel-bar">
          <span class="panel-label">Eingabe</span>

        <textarea
          id="input"
          placeholder="HL7 Nachricht hier einfügen …

Beispiel:
MSH|^~\&|SENDER|FACILITY|RECEIVER|DEST|20240101120000||ADT^A01|MSG001|P|2.5
PID|1||123456^^^MPI||Mustermann^Max^Karl||19800101|M|||Musterstraße 1^^München^^80331^DE

Segmente werden durch Zeilenumbrüche oder &#x0D; getrennt.
MLLP-Framing wird automatisch entfernt."

        ></textarea>
      </div>

      <!-- Output Panel -->
      <div class="panel panel-output">

    <script>
      "use strict";

      // ══════════════════════════════════════════════════════════════
      //  HL7 Parser — single-file webapp
      //  Sections: Theme · Data · Parser · Renderer · Actions · Wire-up
      // ══════════════════════════════════════════════════════════════

      (() => {
        // ─── Theme ─────────────────────────────────────────────────
        const theme = {
          init() {
            const saved = localStorage.getItem("hl7-theme");
            if (saved) {
              document.documentElement.dataset.theme = saved;
            } else if (
              window.matchMedia("(prefers-color-scheme: light)").matches
            ) {
              document.documentElement.dataset.theme = "light";
            }
          },
          toggle() {
            const current = document.documentElement.dataset.theme || "dark";
            const next = current === "dark" ? "light" : "dark";
            document.documentElement.dataset.theme = next;
            localStorage.setItem("hl7-theme", next);
          },
        };
        theme.init();

        // ─── Segment Categories (drive colors) ─────────────────────
        const CATEGORY = {
          MSH: "control",
          MSA: "control",
          ERR: "error",
          PID: "patient",
          NK1: "patient",
          GT1: "patient",
          MRG: "patient",
          PV1: "visit",
          PV2: "visit",
          EVN: "visit",
          ACC: "visit",
          ROL: "visit",
          AL1: "allergy",
          OBR: "observation",
          OBX: "observation",
          QRD: "observation",
          QRF: "observation",
          ORC: "order",
          DG1: "diagnosis",
          PR1: "diagnosis",
          SCH: "scheduling",
          AIG: "scheduling",
          AIL: "scheduling",
          AIP: "scheduling",
          AIS: "scheduling",
          RGS: "scheduling",
          NTE: "notes",
          IN1: "insurance",
          IN2: "insurance",
        };
        const categoryOf = (name) =>
          CATEGORY[name] ?? (name.startsWith("Z") ? "z" : "unknown");

        // ─── HL7 Reusable Data-Type Component Definitions ──────────
        const HD = ["Namespace-ID", "Universal-ID", "Universal-ID-Typ"];
        const CWE = [
          "Identifikator",
          "Text",
          "Codesystem",
          "Alternativer Identifikator",
          "Alternativer Text",
          "Alternatives Codesystem",
          "Codierungssystem-Version",
          "Alternatives Codierungssystem-Version",
          "Originaler Text",
        ];
        const XPN = [
          "Nachname",
          "Vorname",
          "Zweiter Vorname",
          "Suffix",
          "Präfix",
          "Grad",
          "Namenstyp",
          "Namenspräsentation",
          "Namensreihenfolge",
          "Effektives Datum",
          "Ablaufdatum",
          "Professionelles Suffix",
        ];
        const XAD = [
          "Straße",
          "Weitere Angaben",
          "Stadt",
          "Bundesland",
          "Postleitzahl",
          "Land",
          "Adresstyp",
          "Weitere Adressangabe",
          "Landkreis",
          "Zensuszone",
          "Adresspräzision",
        ];
        const XTN = [
          "Telefonnummer",
          "Telekommunikations-Verwendungscode",
          "Telekommunikations-Gerätetyp",
          "E-Mail-Adresse",
          "Landesvorwahl",
          "Vorwahl",
          "Lokale Nummer",
          "Durchwahl",
        ];
        const XCN = [
          "ID-Nummer",
          "Nachname",
          "Vorname",
          "Zweiter Vorname",
          "Suffix",
          "Präfix",
          "Grad",
          "Quellentabelle",
          "Zuweisende Behörde",
          "Namenstyp",
          "Bezeichnerprüfziffer",
          "Prüfziffer-Schema",
          "Bezeichner-Typencode",
          "Zuweisende Einrichtung",
        ];
        const CX = [
          "ID-Nummer",
          "Prüfziffer",
          "Prüfziffermethode",
          "Zuweisende Behörde",
          "ID-Typcode",
          "Zuweisende Einrichtung",
          "Effektives Datum",
          "Ablaufdatum",
        ];
        const PL = [
          "Punkt-Identifikator",
          "Raum",
          "Bett",
          "Einrichtung",
          "Standortstatus",
          "Patientenstandort-Typ",
          "Gebäude",
          "Etage",
          "Adresse",
        ];

        const COMPONENTS = {
          // MSH
          "MSH.3": HD,
          "MSH.4": HD,
          "MSH.5": HD,
          "MSH.6": HD,
          "MSH.9": ["Nachrichtencode", "Trigger-Ereignis", "Nachrichtenstruktur"],
          // PID
          "PID.3": CX,
          "PID.5": XPN,
          "PID.6": XPN,
          "PID.9": XPN,
          "PID.11": XAD,
          "PID.13": XTN,
          "PID.14": XTN,
          "PID.15": CWE,
          "PID.16": CWE,
          "PID.17": CWE,
          "PID.22": CWE,
          "PID.26": CWE,
          // PV1
          "PV1.3": PL,
          "PV1.7": XCN,
          "PV1.8": XCN,
          "PV1.9": XCN,
          "PV1.17": XCN,
          // PV2
          "PV2.1": PL,
          // NK1
          "NK1.2": XPN,
          "NK1.3": CWE,
          "NK1.4": XAD,
          "NK1.5": XTN,
          "NK1.6": XTN,
          "NK1.7": CWE,
          "NK1.13": XPN,
          // ROL
          "ROL.3": CWE,
          "ROL.4": XCN,
          // GT1
          "GT1.3": XPN,
          "GT1.4": XPN,
          "GT1.5": XAD,
          "GT1.6": XTN,
          "GT1.7": XTN,
          // OBR
          "OBR.4": CWE,
          "OBR.16": XCN,
          "OBR.17": XTN,
          "OBR.32": XCN,
          "OBR.33": XCN,
          "OBR.34": XCN,
          // OBX
          "OBX.3": CWE,
          "OBX.5": CWE,
          "OBX.6": CWE,
          // ORC
          "ORC.4": CX,
          "ORC.10": XCN,
          "ORC.11": XCN,
          "ORC.12": XCN,
          // DG1
          "DG1.3": CWE,
          "DG1.12": XCN,
          // PR1

        function parseHL7(raw) {
          // Strip MLLP framing: \x0B (VT, start block) and \x1C\r (FS+CR, end block)
          let text = raw.replace(/^\x0B/, "").replace(/\x1C\r?$/, "");
          text = text.replace(/\r\n/g, "\r").replace(/\n/g, "\r").trim();

          const segments = text.split("\r").filter((s) => s.trim().length > 0);
          if (segments.length === 0) throw new Error("Keine Segmente gefunden.");
          if (segments.length > 10000)
            throw new Error("Nachricht zu groß – mehr als 10.000 Segmente.");

          const firstSeg = segments[0];
          if (!firstSeg.startsWith("MSH"))
            throw new Error("Erstes Segment muss MSH sein.");
          if (firstSeg.length < 8)
            throw new Error("MSH-Segment zu kurz – Kodierungszeichen fehlen.");

          const fieldSep = firstSeg[3] || "|";
          const enc = firstSeg.substring(4, 8);
          delimiters = {
            fieldSep,
            compSep: enc[0] || "^",
            repSep: enc[1] || "~",
            escChar: enc[2] || "\\",
            subSep: enc[3] || "&",
          };

          return segments.map((seg) => parseSegment(seg));
        }

        function parseSegment(seg) {
          const { fieldSep, compSep, repSep, subSep } = delimiters;
          const name = seg.substring(0, 3);
          const parts = seg.split(fieldSep);
          const def =
            SEGMENTS[name] ||
            (name.startsWith("Z")
              ? { name: `Z-Segment (${name})`, fields: [] }
              : { name: "Unbekanntes Segment", fields: [] });

          const fields = [];

          if (name === "MSH") {
            // MSH.1 = field separator character
            fields.push({
              num: 1,
              name: def.fields[0] || "Feldtrennzeichen",
              value: [[{ val: fieldSep, label: null }]],
              raw: fieldSep,
            });
            // MSH.2 = encoding characters
            fields.push({
              num: 2,
              name: def.fields[1] || "Kodierungszeichen",
              value: [[{ val: parts[1] || "", label: null }]],
              raw: parts[1] || "",
            });
            for (let i = 2; i < parts.length; i++) {
              const raw = parts[i];
              const fieldNum = i + 1;
              fields.push({
                num: fieldNum,
                name: def.fields[fieldNum - 1] || `Feld ${fieldNum}`,
                value: parseFieldValue(
                  raw,
                  compSep,
                  repSep,
                  subSep,
                  `${name}.${fieldNum}`,
                ),
                raw,
              });
            }
          } else {
            for (let i = 1; i < parts.length; i++) {
              const raw = parts[i];
              fields.push({
                num: i,
                name: def.fields[i - 1] || `Feld ${i}`,
                value: parseFieldValue(
                  raw,
                  compSep,
                  repSep,
                  subSep,
                  `${name}.${i}`,
                ),
                raw,
              });
            }
          }

          return { name, def, fields, rawLine: seg };
        }

        function parseFieldValue(raw, compSep, repSep, _subSep, fieldKey) {
          if (!raw) return null;
          return raw.split(repSep).map((rep) => parseComponents(rep, compSep, fieldKey));
        }

        function parseComponents(rep, compSep, fieldKey) {
          const comps = rep.split(compSep);
          const compDefs = COMPONENTS[fieldKey] || [];
          return comps.map((c, i) => ({
            val: c,
            label: compDefs[i] || (comps.length > 1 ? `Komp. ${i + 1}` : null),
          }));
        }

        // ─── Rendering ─────────────────────────────────────────────
        const esc = (s) =>
          String(s)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");

        function renderComponents(comps) {
          const cs = delimiters.compSep;
          if (comps.length === 1 && !comps[0].label) {
            return `<span class="component-val">${esc(decodeHL7Escape(comps[0].val, delimiters))}</span>`;
          }
          return comps
            .filter((c) => c.val || c.label)
            .map(
              (c, i) => `<span class="component">${
                i > 0 ? `<span class="component-sep">${esc(cs)}</span>` : ""
              }${
                c.val
                  ? `<span class="component-val">${esc(decodeHL7Escape(c.val, delimiters))}</span>`
                  : ""
              }${
                c.label && c.val
                  ? `<span class="component-label">${esc(c.label)}</span>`
                  : ""
              }</span>`,
            )
            .join("");
        }

        function renderField(field) {
          const hasValue = field.raw && field.raw.length > 0;
          const cls = hasValue ? "field-row has-value" : "field-row";

          let valueHtml;
          if (!hasValue) {
            valueHtml = '<span class="field-value empty">—</span>';
          } else {
            const copyBtn = `<button class="copy-btn" data-action="copy-field" data-copy="${esc(field.raw)}" title="In Zwischenablage kopieren" aria-label="Kopieren"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="3.5" width="7" height="7" rx="1"/><path d="M1.5 8V1.5h6.5"/></svg></button>`;
            const reps = field.value;
            if (reps.length === 1) {
              valueHtml = `<div class="field-value">${renderComponents(reps[0])}${copyBtn}</div>`;
            } else {
              const repsHtml = reps
                .map(
                  (rep, i) =>
                    `<div class="repeat-item"><span class="repeat-badge">[${i + 1}]</span>${renderComponents(rep)}</div>`,
                )
                .join("");
              valueHtml = `<div class="field-value"><div class="repeat-group">${repsHtml}</div>${copyBtn}</div>`;
            }
          }

          const searchKey = (field.name + " " + (field.raw || "")).toLowerCase();

          return `<div class="${cls}" data-search="${esc(searchKey)}"><div class="field-num">${field.num}</div><div class="field-name">${esc(field.name)}</div>${valueHtml}</div>`;
        }

        function renderSegments(segments) {
          const output = el("output");
          const index = el("seg-index");
          const statsBar = el("stats-bar");

          output.innerHTML = "";
          index.innerHTML = "";
          index.hidden = false;

          const totalFields = segments.reduce(
            (a, s) => a + s.fields.filter((f) => f.raw).length,
            0,
          );
          statsBar.innerHTML = `
            <span class="stat-item"><span class="stat-dot"></span><span class="stat-value">${segments.length}</span> Segmente</span>
            <span class="stat-item"><span class="stat-dot stat-success"></span><span class="stat-value">${totalFields}</span> Felder</span>
          `;

          // Count occurrences per segment type
          const typeCounts = {};
          const typeOccurrence = {};
          segments.forEach((s) => {
            typeCounts[s.name] = (typeCounts[s.name] || 0) + 1;
          });

          // Build index pills + segment cards
          const indexFrag = document.createDocumentFragment();
          const outputFrag = document.createDocumentFragment();

          segments.forEach((seg, idx) => {
            typeOccurrence[seg.name] = typeOccurrence[seg.name] || 0;
            const occurrence = typeOccurrence[seg.name]++;
            const count = typeCounts[seg.name];
            const cat = categoryOf(seg.name);

            // Pill
            const pill = document.createElement("span");
            pill.className = "seg-pill";
            pill.dataset.cat = cat;
            pill.dataset.action = "jump-to-segment";
            pill.dataset.target = `seg-${idx}`;
            pill.title =
              seg.def.name + (count > 1 ? ` (${occurrence + 1}/${count})` : "");
            pill.innerHTML =
              esc(seg.name) +
              (count > 1
                ? `<span class="pill-count">${occurrence + 1}</span>`
                : "");
            indexFrag.appendChild(pill);

            // Segment card
            const card = document.createElement("div");
            card.className = "segment-card";
            card.id = `seg-${idx}`;
            card.style.animationDelay = `${Math.min(idx * 15, 180)}ms`;

            const nonEmpty = seg.fields.filter((f) => f.raw).length;

            card.innerHTML = `
              <div class="segment-header" data-action="toggle-segment">
                <span class="seg-tag" data-cat="${cat}">${esc(seg.name)}</span>
                <span class="seg-name">${esc(seg.def.name)}</span>
                <span class="seg-count">${nonEmpty} Felder</span>
                <div class="seg-header-actions">
                  <button class="btn-icon" data-action="toggle-raw" title="Rohzeile anzeigen" aria-label="Rohzeile"><svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="4,2 1,6.5 4,11"/><polyline points="9,2 12,6.5 9,11"/></svg></button>
                </div>
                <span class="chevron"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,4 6,8 10,4"/></svg></span>
              </div>
              <div class="segment-body">
                ${seg.fields.map((f) => renderField(f)).join("")}
                <div class="raw-line">${esc(seg.rawLine)}</div>
              </div>
            `;
            outputFrag.appendChild(card);
          });

          index.appendChild(indexFrag);
          output.appendChild(outputFrag);
        }

        // ─── Actions ───────────────────────────────────────────────
        const el = (id) => document.getElementById(id);

        const EMPTY_HTML = `
          <div class="empty-state">
            <div class="empty-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                <rect x="4" y="3" width="16" height="18" rx="2.5"/>
                <line x1="8" y1="8" x2="16" y2="8"/>
                <line x1="8" y1="12" x2="13" y2="12"/>
                <line x1="8" y1="16" x2="14" y2="16"/>
              </svg>
            </div>
            <p>HL7 Nachricht einfügen und <strong>parsen</strong>, um die Segmente zu analysieren.</p>
            <span class="empty-hint">Shortcut <kbd>Ctrl</kbd><kbd>Enter</kbd></span>
          </div>`;

        function resetSearch() {
          const input = el("search");
          input.value = "";
          el("search-wrap").classList.remove("has-value");
        }

        const actions = {
          "toggle-theme": () => theme.toggle(),

          "load-sample": (btn) => {
            const sample = btn.dataset.sample;
            if (!SAMPLES[sample]) return;
            el("input").value = SAMPLES[sample];
            actions.parse();
          },

          "clear-input": () => {
            el("input").value = "";
            el("output").innerHTML = EMPTY_HTML;
            el("seg-index").hidden = true;
            el("stats-bar").innerHTML = "";
            resetSearch();
          },

          parse: () => {
            const raw = el("input").value.trim();
            const output = el("output");
            const index = el("seg-index");
            const statsBar = el("stats-bar");
            resetSearch();

            if (!raw) {
              output.innerHTML = `<div class="error-box"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="8" cy="8" r="6.5"/><line x1="8" y1="5" x2="8" y2="9"/><circle cx="8" cy="11.3" r="0.6" fill="currentColor" stroke="none"/></svg>Bitte eine HL7 Nachricht eingeben.</div>`;
              index.hidden = true;
              statsBar.innerHTML = "";
              return;
            }

            try {
              const segments = parseHL7(raw);
              renderSegments(segments);
            } catch (e) {
              output.innerHTML = `<div class="error-box"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="8" cy="8" r="6.5"/><line x1="8" y1="5" x2="8" y2="9"/><circle cx="8" cy="11.3" r="0.6" fill="currentColor" stroke="none"/></svg>Fehler: ${esc(e.message)}</div>`;
              index.hidden = true;
              statsBar.innerHTML = "";
            }
          },

          "collapse-all": () => {
            document
              .querySelectorAll(".segment-card")
              .forEach((c) => c.classList.add("collapsed"));
          },

          "expand-all": () => {
            document
              .querySelectorAll(".segment-card")
              .forEach((c) => c.classList.remove("collapsed"));
          },

          "toggle-segment": (headerEl) => {
            headerEl.closest(".segment-card")?.classList.toggle("collapsed");
          },

          "toggle-raw": (btn) => {
            const rawLine = btn.closest(".segment-card")?.querySelector(".raw-line");
            if (rawLine) {
              rawLine.classList.toggle("visible");
              btn.classList.toggle("active", rawLine.classList.contains("visible"));
            }
          },

          "copy-field": (btn) => copyToClipboard(btn.dataset.copy || "", btn),

          "jump-to-segment": (pill) => {
            const target = document.getElementById(pill.dataset.target);
            target?.scrollIntoView({ behavior: "smooth", block: "start" });
            target?.classList.remove("collapsed");
          },

          "clear-search": () => {
            const input = el("search");
            input.value = "";
            el("search-wrap").classList.remove("has-value");
            filterFields("");
            input.focus();
          },
        };

        // ─── Clipboard ─────────────────────────────────────────────
        let toastTimer = null;
        function copyToClipboard(text, btn) {
          const onOk = () => flashCopied(btn);
          const onFail = () => {
            if (btn) btn.title = "Kopieren fehlgeschlagen";
          };

          if (navigator.clipboard?.writeText) {
            navigator.clipboard
              .writeText(text)
              .then(onOk)
              .catch(() => legacyCopy(text, onOk, onFail));
          } else {
            legacyCopy(text, onOk, onFail);
          }
        }

        function legacyCopy(text, onOk, onFail) {
          const ta = document.createElement("textarea");
          ta.value = text;
          ta.style.cssText = "position:fixed;top:-9999px;left:-9999px;opacity:0";
          document.body.appendChild(ta);
          ta.focus();
          ta.select();
          try {
            document.execCommand("copy");
            onOk();
          } catch {
            onFail();
          }
          document.body.removeChild(ta);
        }

        function flashCopied(btn) {
          if (btn) {
            btn.classList.add("copied");
            setTimeout(() => btn.classList.remove("copied"), 1200);
          }
          const toast = el("toast");
          toast.classList.add("show");
          clearTimeout(toastTimer);
          toastTimer = setTimeout(() => toast.classList.remove("show"), 1800);
        }

        // ─── Search / Filter ───────────────────────────────────────
        function filterFields(query) {
          const q = query.trim().toLowerCase();
          document.querySelectorAll(".segment-card").forEach((card) => {
            let cardVisible = false;
            card.querySelectorAll(".field-row").forEach((row) => {
              if (!q) {
                row.classList.remove("hidden");
                cardVisible = true;
              } else {
                const match = (row.dataset.search || "").includes(q);
                row.classList.toggle("hidden", !match);
                if (match) cardVisible = true;
              }
            });
            card.style.display = !q || cardVisible ? "" : "none";
            if (q && cardVisible) card.classList.remove("collapsed");
          });
        }

        // ─── Event Wiring ──────────────────────────────────────────
        document.addEventListener("click", (ev) => {
          const target = ev.target.closest("[data-action]");
          if (!target) return;
          const fn = actions[target.dataset.action];
          if (!fn) return;
          ev.stopPropagation();
          fn(target, ev);
        });

        const searchInput = el("search");
        searchInput.addEventListener("input", (ev) => {
          el("search-wrap").classList.toggle("has-value", !!ev.target.value);
          filterFields(ev.target.value);
        });

        document.addEventListener("keydown", (ev) => {
          // Ctrl/Cmd + Enter → parse
          if ((ev.ctrlKey || ev.metaKey) && ev.key === "Enter") {
            ev.preventDefault();
            actions.parse();
            return;
          }
          // Ctrl/Cmd + K → focus search
          if ((ev.ctrlKey || ev.metaKey) && ev.key.toLowerCase() === "k") {
            ev.preventDefault();
            searchInput.focus();
            searchInput.select();
            return;
          }
          // Escape inside search → clear
          if (ev.key === "Escape" && document.activeElement === searchInput) {
            actions["clear-search"]();
          }
        });
      })();
    </script>
  </body>
</html>
