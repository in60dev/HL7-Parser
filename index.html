<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HL7 Parser</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3352;
      --accent: #5b8dee;
      --accent2: #7c5cdb;
      --text: #e2e8f0;
      --text-muted: #7a8299;
      --green: #4ade80;
      --yellow: #facc15;
      --red: #f87171;
      --orange: #fb923c;
      --cyan: #22d3ee;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .badge {
      font-size: 0.7rem;
      background: var(--accent2);
      color: #fff;
      padding: 0.2rem 0.5rem;
      border-radius: 999px;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      height: calc(100vh - 57px);
    }

    .panel {
      display: flex;
      flex-direction: column;
      border-bottom: 1px solid var(--border);
      height: 28vh;
      min-height: 120px;
      max-height: 45vh;
      resize: vertical;
      overflow: hidden;
    }

    .panel-header {
      padding: 0.75rem 1.25rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .panel-header .actions {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
    }

    textarea {
      flex: 1;
      background: var(--bg);
      color: var(--text);
      border: none;
      outline: none;
      resize: none;
      padding: 1.25rem;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 0.85rem;
      line-height: 1.7;
      tab-size: 4;
    }

    textarea::placeholder { color: var(--text-muted); }

    button {
      cursor: pointer;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.8rem;
      padding: 0.4rem 0.9rem;
      transition: all 0.15s;
    }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #4a7de0; }

    .btn-ghost {
      background: var(--surface2);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--accent); }

    .output-panel {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .output-body {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 1rem 1.25rem;
    }

    .output-body::-webkit-scrollbar { width: 6px; }
    .output-body::-webkit-scrollbar-track { background: var(--bg); }
    .output-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      color: var(--text-muted);
      text-align: center;
      padding: 4rem 2rem;
    }

    .empty-state .icon { font-size: 3rem; opacity: 0.3; }
    .empty-state p { font-size: 0.9rem; max-width: 280px; line-height: 1.6; }

    /* Segment Card */
    .segment-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 0.75rem;
    }

    .segment-card:last-child { margin-bottom: 0; }

    .segment-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      background: var(--surface2);
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid var(--border);
    }

    .segment-header:hover { background: #2a2f47; }

    .seg-tag {
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 0.25rem 0.6rem;
      border-radius: 5px;
      min-width: 3.5rem;
      text-align: center;
    }

    .seg-MSH { background: #1e3a5f; color: var(--accent); }
    .seg-PID { background: #1e3f2a; color: var(--green); }
    .seg-PV1, .seg-PV2 { background: #3f2a1e; color: var(--orange); }
    .seg-OBR { background: #3f3a1e; color: var(--yellow); }
    .seg-OBX { background: #1e3a3f; color: var(--cyan); }
    .seg-NTE { background: #2d1e3f; color: #c4b5fd; }
    .seg-EVN { background: #3f1e1e; color: var(--red); }
    .seg-ORC { background: #1e3a5f; color: #93c5fd; }
    .seg-IN1, .seg-IN2 { background: #3f2a3f; color: #f0abfc; }
    .seg-AL1 { background: #3f2a1e; color: #fdba74; }
    .seg-DG1 { background: #1e3a3f; color: var(--cyan); }
    .seg-PR1 { background: #2a3f1e; color: #86efac; }
    .seg-MSA { background: #1e3a5f; color: var(--accent); }
    .seg-ERR { background: #3f1e1e; color: var(--red); }
    .seg-QRD, .seg-QRF { background: #3f3a1e; color: var(--yellow); }
    .seg-SCH { background: #1e3f3a; color: var(--cyan); }
    .seg-RGS { background: #2a1e3f; color: #c4b5fd; }
    .seg-AIG, .seg-AIL, .seg-AIP, .seg-AIS { background: #1e3f2a; color: var(--green); }
    .seg-NK1 { background: #2a3f2a; color: #6ee7b7; }
    .seg-GT1 { background: #3f3f1e; color: #fde68a; }
    .seg-ROL { background: #1e2a3f; color: #93c5fd; }
    .seg-MRG { background: #3f1e2a; color: #fda4af; }
    .seg-ACC { background: #3f2a2a; color: #fca5a5; }
    .seg-unknown { background: #252525; color: #888; }

    .seg-name { font-size: 0.9rem; font-weight: 600; flex: 1; }
    .seg-count { font-size: 0.75rem; color: var(--text-muted); }

    .seg-header-actions {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .btn-icon {
      background: none;
      border: 1px solid transparent;
      border-radius: 4px;
      color: var(--text-muted);
      font-size: 0.72rem;
      padding: 0.2rem 0.45rem;
      font-weight: 600;
      font-family: monospace;
      cursor: pointer;
      transition: all 0.15s;
      line-height: 1;
    }
    .btn-icon:hover { border-color: var(--border); color: var(--text); background: var(--surface); }

    .chevron { color: var(--text-muted); transition: transform 0.2s; font-size: 0.75rem; }
    .segment-card.collapsed .chevron { transform: rotate(-90deg); }
    .segment-card.collapsed .segment-body { display: none; }

    .segment-body { padding: 0; }

    .raw-line {
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 0.75rem;
      color: var(--text-muted);
      background: rgba(0,0,0,0.2);
      padding: 0.5rem 0.75rem;
      border-top: 1px solid var(--border);
      word-break: break-all;
      overflow-wrap: anywhere;
      display: none;
    }
    .raw-line.visible { display: block; }

    .field-row {
      display: grid;
      grid-template-columns: 2.5rem minmax(180px, 260px) 1fr;
      gap: 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.82rem;
      align-items: stretch;
      min-width: 0;
    }

    .field-row:last-child { border-bottom: none; }
    .field-row.hidden { display: none; }
    .field-row.has-value:hover { background: rgba(91, 141, 238, 0.04); }
    .field-row.has-value:hover .copy-btn { opacity: 1; }

    .field-num {
      padding: 0.55rem 0.5rem;
      color: var(--text-muted);
      font-family: monospace;
      font-size: 0.72rem;
      text-align: center;
      background: rgba(0,0,0,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: 1px solid var(--border);
    }

    .field-name {
      padding: 0.55rem 0.75rem;
      color: var(--text-muted);
      border-right: 1px solid var(--border);
      font-size: 0.78rem;
      display: flex;
      align-items: center;
      line-height: 1.4;
      word-break: break-word;
      min-width: 0;
    }

    .field-value {
      padding: 0.55rem 0.75rem;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 0.8rem;
      word-break: break-all;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.25rem;
      min-width: 0;
      overflow-wrap: anywhere;
      position: relative;
    }

    .field-value.empty {
      color: var(--text-muted);
      font-style: italic;
      font-family: inherit;
      font-size: 0.78rem;
    }

    .copy-btn {
      position: absolute;
      right: 0.4rem;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-muted);
      font-size: 0.68rem;
      padding: 0.15rem 0.4rem;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
      font-weight: 600;
      line-height: 1.4;
      white-space: nowrap;
    }
    .copy-btn:hover { color: var(--text); border-color: var(--accent); }
    .copy-btn.copied { color: var(--green); border-color: var(--green); opacity: 1; }

    .component { display: inline-flex; align-items: center; gap: 0.25rem; }
    .component-sep { color: var(--border); font-size: 0.85em; }
    .component-val { color: var(--text); }

    .component-label {
      font-size: 0.68rem;
      color: var(--text-muted);
      background: rgba(255,255,255,0.05);
      padding: 0.05rem 0.3rem;
      border-radius: 3px;
      font-family: inherit;
    }

    .repeat-group { display: flex; flex-direction: column; gap: 0.2rem; width: 100%; }
    .repeat-item { display: flex; align-items: center; gap: 0.4rem; }

    .repeat-badge {
      font-size: 0.65rem;
      color: var(--text-muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 0.1rem 0.35rem;
      border-radius: 3px;
      white-space: nowrap;
    }

    .error-box {
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.3);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      color: var(--red);
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .stats-bar { display: flex; gap: 1rem; align-items: center; font-size: 0.75rem; color: var(--text-muted); }
    .stat-item { display: flex; align-items: center; gap: 0.35rem; }
    .stat-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }

    /* Segment index */
    .seg-index {
      padding: 0.5rem 1.25rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      align-items: center;
    }

    .seg-pill {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.2rem 0.55rem;
      border-radius: 4px;
      cursor: pointer;
      font-family: monospace;
      border: 1px solid transparent;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
    }
    .seg-pill:hover { border-color: var(--accent); }

    .pill-count {
      font-size: 0.6rem;
      background: rgba(255,255,255,0.15);
      padding: 0.05rem 0.3rem;
      border-radius: 3px;
    }

    /* Search */
    .search-wrap { position: relative; display: flex; align-items: center; }

    .search-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.78rem;
      padding: 0.3rem 0.6rem 0.3rem 1.8rem;
      outline: none;
      width: 180px;
      transition: border-color 0.15s;
      font-family: inherit;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text-muted); }

    .search-icon {
      position: absolute;
      left: 0.5rem;
      color: var(--text-muted);
      font-size: 0.85rem;
      pointer-events: none;
      line-height: 1;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: var(--surface2);
      border: 1px solid var(--green);
      color: var(--green);
      font-size: 0.8rem;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.25s;
      pointer-events: none;
      z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    .sample-btn {
      font-size: 0.72rem;
      color: var(--accent);
      background: none;
      border: 1px solid var(--accent);
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .sample-btn:hover { background: var(--accent); color: #fff; }

    @media (max-width: 600px) {
      .panel { height: 35vh; }
      .field-row { grid-template-columns: 2rem minmax(120px, 160px) 1fr; }
      .search-input { width: 130px; }
    }
  </style>
</head>
<body>

<header>
  <h1>HL7 Parser</h1>
  <span class="badge">v2.x</span>
</header>

<div class="main">
  <!-- Input Panel -->
  <div class="panel">
    <div class="panel-header">
      <span>HL7 Nachricht eingeben</span>
      <div class="actions">
        <button class="sample-btn" onclick="loadSample('adt')">ADT Beispiel</button>
        <button class="sample-btn" onclick="loadSample('oru')">ORU Beispiel</button>
        <button class="sample-btn" onclick="loadSample('ack')">ACK Beispiel</button>
        <button class="btn-ghost" onclick="clearInput()">Leeren</button>
        <button class="btn-primary" onclick="parse()">Parsen</button>
      </div>
    </div>
    <textarea id="input" placeholder="HL7 Nachricht hier einfügen...

Beispiel:
MSH|^~\&|SENDER|FACILITY|RECEIVER|DEST|20240101120000||ADT^A01|MSG001|P|2.5
PID|1||123456^^^MPI||Mustermann^Max^Karl||19800101|M|||Musterstraße 1^^München^^80331^DE

Segmente werden durch Zeilenumbrüche oder &#x0D; getrennt.
MLLP-Framing wird automatisch entfernt." spellcheck="false"></textarea>
  </div>

  <!-- Output Panel -->
  <div class="output-panel">
    <div class="panel-header">
      <span>Analysierte Segmente</span>
      <div class="actions">
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input type="search" id="search" class="search-input" placeholder="Suchen…" oninput="filterFields(this.value)">
        </div>
        <button class="btn-ghost" onclick="collapseAll()">Alle zuklappen</button>
        <button class="btn-ghost" onclick="expandAll()">Alle aufklappen</button>
        <div id="stats-bar" class="stats-bar"></div>
      </div>
    </div>
    <div id="seg-index" class="seg-index" style="display:none"></div>
    <div id="output" class="output-body">
      <div class="empty-state">
        <div class="icon">⚕</div>
        <p>HL7 Nachricht eingeben und auf <strong>Parsen</strong> klicken, um die Segmente zu analysieren.</p>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="toast">Kopiert ✓</div>

<script>
// ─── Active delimiters (set during parse, used by renderer) ─────────────────
let _delimiters = { fieldSep: '|', compSep: '^', repSep: '~', escChar: '\\', subSep: '&' };

// ─── HL7 Escape Decoding ─────────────────────────────────────────────────────

function decodeHL7Escape(str, d) {
  if (!str || !str.includes(d.escChar)) return str;
  // Escape the escape character for use in RegExp
  const e = d.escChar.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return str
    .replace(new RegExp(`${e}F${e}`, 'g'), d.fieldSep)
    .replace(new RegExp(`${e}S${e}`, 'g'), d.compSep)
    .replace(new RegExp(`${e}R${e}`, 'g'), d.repSep)
    .replace(new RegExp(`${e}T${e}`, 'g'), d.subSep)
    .replace(new RegExp(`${e}E${e}`, 'g'), d.escChar)
    .replace(new RegExp(`${e}X([0-9A-Fa-f]+)${e}`, 'g'), (_, hex) => {
      const cp = parseInt(hex, 16);
      return cp <= 0x10FFFF ? String.fromCodePoint(cp) : '';
    })
    .replace(new RegExp(`${e}[HN]${e}`, 'g'), '');
}

// ─── Parser ──────────────────────────────────────────────────────────────────

function parseHL7(raw) {
  // Strip MLLP framing: \x0B (VT, start block) and \x1C\r (FS+CR, end block)
  let text = raw.replace(/^\x0B/, '').replace(/\x1C\r?$/, '');
  // Normalize line endings to \r
  text = text.replace(/\r\n/g, '\r').replace(/\n/g, '\r').trim();

  const segments = text.split('\r').filter(s => s.trim().length > 0);
  if (segments.length === 0) throw new Error("Keine Segmente gefunden.");
  if (segments.length > 10000) throw new Error("Nachricht zu groß – mehr als 10.000 Segmente.");

  const firstSeg = segments[0];
  if (!firstSeg.startsWith('MSH')) throw new Error("Erstes Segment muss MSH sein.");
  if (firstSeg.length < 8) throw new Error("MSH-Segment zu kurz – Kodierungszeichen fehlen.");

  // Delimiters from MSH
  const fieldSep     = firstSeg[3] || '|';
  const encodingChars = firstSeg.substring(4, 8);
  const compSep  = encodingChars[0] || '^';
  const repSep   = encodingChars[1] || '~';
  const escChar  = encodingChars[2] || '\\';
  const subSep   = encodingChars[3] || '&';

  _delimiters = { fieldSep, compSep, repSep, escChar, subSep };

  return segments.map(seg =>
    parseSegment(seg, fieldSep, compSep, repSep, escChar, subSep)
  );
}

function parseSegment(seg, fieldSep, compSep, repSep, escChar, subSep) {
  const name = seg.substring(0, 3);
  const parts = seg.split(fieldSep);
  const def = SEGMENTS[name]
    || (name.startsWith('Z') ? { name: `Z-Segment (${name})`, fields: [] }
                              : { name: "Unbekanntes Segment", fields: [] });

  let fields = [];

  if (name === 'MSH') {
    // MSH.1 = field separator character
    fields.push({ num: 1, name: def.fields[0] || "Feldtrennzeichen", value: [[{ val: fieldSep, label: null }]], raw: fieldSep });
    // MSH.2 = encoding characters — always parts[1]
    fields.push({ num: 2, name: def.fields[1] || "Kodierungszeichen", value: [[{ val: parts[1] || '', label: null }]], raw: parts[1] || '' });
    // MSH.3+ — parts[2] = MSH.3, parts[3] = MSH.4, …
    for (let i = 2; i < parts.length; i++) {
      const raw = parts[i];
      const fieldNum = i + 1;
      fields.push({
        num: fieldNum,
        name: def.fields[fieldNum - 1] || `Feld ${fieldNum}`,
        value: parseFieldValue(raw, compSep, repSep, subSep, `${name}.${fieldNum}`),
        raw
      });
    }
  } else {
    for (let i = 1; i < parts.length; i++) {
      const raw = parts[i];
      fields.push({
        num: i,
        name: def.fields[i - 1] || `Feld ${i}`,
        value: parseFieldValue(raw, compSep, repSep, subSep, `${name}.${i}`),
        raw
      });
    }
  }

  return { name, def, fields, rawLine: seg };
}

function parseFieldValue(raw, compSep, repSep, subSep, fieldKey) {
  if (!raw) return null;
  const reps = raw.split(repSep);
  return reps.map(rep => parseComponents(rep, compSep, fieldKey));
}

function parseComponents(rep, compSep, fieldKey) {
  const comps = rep.split(compSep);
  const compDefs = COMPONENTS[fieldKey] || [];
  return comps.map((c, i) => ({
    val: c,
    label: compDefs[i] || (comps.length > 1 ? `Komp. ${i + 1}` : null)
  }));
}

// ─── Renderer ────────────────────────────────────────────────────────────────

function renderSegments(segments) {
  const output   = document.getElementById('output');
  const index    = document.getElementById('seg-index');
  const statsBar = document.getElementById('stats-bar');

  output.innerHTML = '';
  index.innerHTML  = '';
  index.style.display = 'flex';

  const totalFields = segments.reduce((a, s) => a + s.fields.filter(f => f.raw).length, 0);
  statsBar.innerHTML = `
    <div class="stat-item"><div class="stat-dot"></div>${segments.length} Segmente</div>
    <div class="stat-item"><div class="stat-dot" style="background:var(--green)"></div>${totalFields} Felder</div>
  `;

  // Count occurrences per segment type for numbered pills
  const typeCounts = {};
  const typeOccurrence = {};
  segments.forEach(s => { typeCounts[s.name] = (typeCounts[s.name] || 0) + 1; });

  segments.forEach((seg, idx) => {
    typeOccurrence[seg.name] = (typeOccurrence[seg.name] || 0);
    const occurrence = typeOccurrence[seg.name]++;
    const count = typeCounts[seg.name];

    // Index pill
    const pill = document.createElement('span');
    pill.className = `seg-pill seg-${seg.name}`;
    pill.style.cssText = getSegStyle(seg.name);
    pill.title = seg.def.name + (count > 1 ? ` (${occurrence + 1}/${count})` : '');
    pill.innerHTML = escHtml(seg.name)
      + (count > 1 ? `<span class="pill-count">${occurrence + 1}</span>` : '');
    pill.onclick = () =>
      document.getElementById(`seg-${idx}`).scrollIntoView({ behavior: 'smooth', block: 'start' });
    index.appendChild(pill);

    // Segment card
    const card = document.createElement('div');
    card.className = 'segment-card';
    card.id = `seg-${idx}`;

    const nonEmpty = seg.fields.filter(f => f.raw).length;

    const headerDiv = document.createElement('div');
    headerDiv.className = 'segment-header';
    headerDiv.innerHTML = `
      <span class="seg-tag seg-${escHtml(seg.name)}">${escHtml(seg.name)}</span>
      <span class="seg-name">${escHtml(seg.def.name)}</span>
      <span class="seg-count">${nonEmpty} Felder</span>
      <div class="seg-header-actions">
        <button class="btn-icon" title="Rohzeile anzeigen/verbergen" onclick="event.stopPropagation();toggleRaw(this)">&#123;&#183;&#125;</button>
      </div>
      <span class="chevron">▾</span>
    `;
    headerDiv.addEventListener('click', () => card.classList.toggle('collapsed'));

    const bodyDiv = document.createElement('div');
    bodyDiv.className = 'segment-body';
    bodyDiv.innerHTML = seg.fields.map(f => renderField(f)).join('');

    const rawDiv = document.createElement('div');
    rawDiv.className = 'raw-line';
    rawDiv.textContent = seg.rawLine;
    bodyDiv.appendChild(rawDiv);

    card.appendChild(headerDiv);
    card.appendChild(bodyDiv);
    output.appendChild(card);
  });
}

function getSegStyle(name) {
  if (SEGMENTS[name]) return '';
  if (name.startsWith('Z')) return 'background:#2a1e3f;color:#c4b5fd;';
  return 'background:#252525;color:#888;';
}

function renderField(field) {
  const hasValue = field.raw && field.raw.length > 0;
  const cls = hasValue ? 'field-row has-value' : 'field-row';

  let valueHtml;
  if (!hasValue) {
    valueHtml = '<span class="field-value empty">—</span>';
  } else {
    const reps = field.value;
    const rawEscaped = escHtml(field.raw);
    const copyBtn = `<button class="copy-btn" onclick="copyValue(this,${JSON.stringify(field.raw)})" title="In Zwischenablage kopieren">⎘</button>`;
    if (reps.length === 1) {
      valueHtml = `<div class="field-value">${renderComponents(reps[0])}${copyBtn}</div>`;
    } else {
      const repsHtml = reps.map((rep, i) =>
        `<div class="repeat-item">
          <span class="repeat-badge">[${i + 1}]</span>
          ${renderComponents(rep)}
        </div>`
      ).join('');
      valueHtml = `<div class="field-value"><div class="repeat-group">${repsHtml}</div>${copyBtn}</div>`;
    }
  }

  const searchKey = (field.name + ' ' + (field.raw || '')).toLowerCase();

  return `
    <div class="${cls}" data-search="${escHtml(searchKey)}">
      <div class="field-num">${field.num}</div>
      <div class="field-name">${escHtml(field.name)}</div>
      ${valueHtml}
    </div>
  `;
}

function renderComponents(comps) {
  const cs = _delimiters.compSep;
  if (comps.length === 1 && !comps[0].label) {
    return `<span class="component-val">${escHtml(decodeHL7Escape(comps[0].val, _delimiters))}</span>`;
  }
  return comps.filter(c => c.val || c.label).map((c, i) => `
    <span class="component">
      ${i > 0 ? `<span class="component-sep">${escHtml(cs)}</span>` : ''}
      ${c.val ? `<span class="component-val">${escHtml(decodeHL7Escape(c.val, _delimiters))}</span>` : ''}
      ${c.label && c.val ? `<span class="component-label">${escHtml(c.label)}</span>` : ''}
    </span>
  `).join('');
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ─── Actions ─────────────────────────────────────────────────────────────────

function parse() {
  const raw      = document.getElementById('input').value.trim();
  const output   = document.getElementById('output');
  const index    = document.getElementById('seg-index');
  const statsBar = document.getElementById('stats-bar');
  const search   = document.getElementById('search');
  if (search) search.value = '';

  if (!raw) {
    output.innerHTML = '<div class="error-box">⚠ Bitte eine HL7 Nachricht eingeben.</div>';
    index.style.display = 'none';
    statsBar.innerHTML = '';
    return;
  }

  try {
    const segments = parseHL7(raw);
    renderSegments(segments);
  } catch (e) {
    output.innerHTML = `<div class="error-box">⚠ Fehler: ${escHtml(e.message)}</div>`;
    index.style.display = 'none';
    statsBar.innerHTML = '';
  }
}

function clearInput() {
  document.getElementById('input').value = '';
  document.getElementById('output').innerHTML = `
    <div class="empty-state">
      <div class="icon">⚕</div>
      <p>HL7 Nachricht eingeben und auf <strong>Parsen</strong> klicken, um die Segmente zu analysieren.</p>
    </div>`;
  document.getElementById('seg-index').style.display = 'none';
  document.getElementById('stats-bar').innerHTML = '';
  const search = document.getElementById('search');
  if (search) search.value = '';
}

function loadSample(type) {
  document.getElementById('input').value = SAMPLES[type];
  parse();
}

function collapseAll() {
  document.querySelectorAll('.segment-card').forEach(c => c.classList.add('collapsed'));
}

function expandAll() {
  document.querySelectorAll('.segment-card').forEach(c => c.classList.remove('collapsed'));
}

function toggleRaw(btn) {
  const rawLine = btn.closest('.segment-card').querySelector('.raw-line');
  if (rawLine) rawLine.classList.toggle('visible');
}

function filterFields(query) {
  const q = query.trim().toLowerCase();
  document.querySelectorAll('.segment-card').forEach(card => {
    let cardVisible = false;
    card.querySelectorAll('.field-row').forEach(row => {
      if (!q) {
        row.classList.remove('hidden');
        cardVisible = true;
      } else {
        const match = (row.dataset.search || '').includes(q);
        row.classList.toggle('hidden', !match);
        if (match) cardVisible = true;
      }
    });
    card.style.display = (!q || cardVisible) ? '' : 'none';
    if (q && cardVisible) card.classList.remove('collapsed');
  });
}

let _toastTimer = null;
function copyValue(btn, raw) {
  navigator.clipboard.writeText(raw).then(() => {
    btn.classList.add('copied');
    setTimeout(() => btn.classList.remove('copied'), 1200);
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
  }).catch(() => {
    btn.title = 'Kopieren fehlgeschlagen';
  });
}

// ─── Keyboard Shortcut ───────────────────────────────────────────────────────

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') parse();
});
</script>
