<!doctype html>
<html lang="de" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HL7 Parser</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      /* ─── Theme: Dark (default) ─────────────────────────────── */
      :root,
      [data-theme="dark"] {
        --bg: #0d0d10;
        --surface: #14141a;
        --surface-raised: #1c1c25;
        --border: #26263a;
        --border-subtle: #1e1e2c;
        --accent: #6366f1;
        --accent-dim: rgba(99, 102, 241, 0.12);
        --text: #e8e8f4;
        --text-muted: #8a8aac;
        --text-dim: #52526e;
        --green: #22c55e;
        --yellow: #eab308;
        --red: #ef4444;
        --orange: #f97316;
        --cyan: #06b6d4;
      }

      /* ─── Theme: Light ──────────────────────────────────────── */
      [data-theme="light"] {
        --bg: #f1f1f5;
        --surface: #ffffff;
        --surface-raised: #eaeaf0;
        --border: #d4d4e0;
        --border-subtle: #e8e8f0;
        --accent: #4f46e5;
        --accent-dim: rgba(79, 70, 229, 0.08);
        --text: #0c0c18;
        --text-muted: #52527a;
        --text-dim: #a0a0c0;
        --green: #16a34a;
        --yellow: #ca8a04;
        --red: #dc2626;
        --orange: #ea580c;
        --cyan: #0891b2;
      }

      body {
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        font-size: 13px;
        line-height: 1.5;
      }

      /* ─── Header ─────────────────────────────────────────────── */
      header {
        height: 48px;
        min-height: 48px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 0 1.125rem;
        display: flex;
        align-items: center;
        gap: 0.625rem;
        flex-shrink: 0;
      }

      .logo-mark {
        width: 22px;
        height: 22px;
        background: var(--accent);
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .logo-mark svg {
        width: 12px;
        height: 12px;
      }

      header h1 {
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--text);
        letter-spacing: -0.01em;
      }

      .badge {
        font-size: 0.62rem;
        font-weight: 600;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        color: var(--text-muted);
        background: var(--surface-raised);
        border: 1px solid var(--border);
        padding: 0.13rem 0.4rem;
        border-radius: 3px;
      }

      .header-spacer {
        flex: 1;
      }

      .theme-toggle {
        width: 30px;
        height: 30px;
        border-radius: 5px;
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-muted);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          color 0.15s,
          border-color 0.15s,
          background 0.15s;
        padding: 0;
        flex-shrink: 0;
      }
      .theme-toggle:hover {
        color: var(--text);
        border-color: var(--accent);
        background: var(--accent-dim);
      }
      .theme-toggle svg {
        width: 14px;
        height: 14px;
      }

      [data-theme="dark"] .icon-sun {
        display: block;
      }
      [data-theme="dark"] .icon-moon {
        display: none;
      }
      [data-theme="light"] .icon-sun {
        display: none;
      }
      [data-theme="light"] .icon-moon {
        display: block;
      }

      /* ─── Main Layout ─────────────────────────────────────────── */
      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        height: calc(100vh - 48px);
      }

      /* ─── Panel ───────────────────────────────────────────────── */
      .panel {
        display: flex;
        flex-direction: column;
        border-bottom: 2px solid var(--border);
        height: 28vh;
        min-height: 120px;
        max-height: 45vh;
        resize: vertical;
        overflow: hidden;
        flex-shrink: 0;
      }

      .panel-bar {
        height: 38px;
        min-height: 38px;
        padding: 0 0.875rem;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 0.375rem;
        flex-shrink: 0;
        overflow: hidden;
      }

      .panel-label {
        font-size: 0.67rem;
        font-weight: 600;
        letter-spacing: 0.09em;
        text-transform: uppercase;
        color: var(--text-muted);
        white-space: nowrap;
        margin-right: 0.125rem;
      }

      .bar-sep {
        width: 1px;
        height: 14px;
        background: var(--border);
        flex-shrink: 0;
        margin: 0 0.125rem;
      }

      .spacer {
        flex: 1;
      }

      /* ─── Buttons ─────────────────────────────────────────────── */
      button {
        cursor: pointer;
        border: none;
        font-family: inherit;
        font-weight: 500;
        font-size: 0.75rem;
        border-radius: 4px;
        padding: 0.28rem 0.65rem;
        transition:
          background 0.14s,
          color 0.14s,
          border-color 0.14s,
          opacity 0.14s;
        white-space: nowrap;
        line-height: 1.4;
      }

      .btn-primary {
        background: var(--accent);
        color: #fff;
        padding: 0.28rem 0.8rem;
      }
      .btn-primary:hover {
        opacity: 0.85;
      }

      .btn-ghost {
        background: transparent;
        color: var(--text-muted);
        border: 1px solid var(--border);
      }
      .btn-ghost:hover {
        color: var(--text);
        border-color: var(--text-dim);
        background: var(--surface-raised);
      }

      .sample-btn {
        background: transparent;
        color: var(--text-muted);
        border: 1px solid var(--border);
        font-size: 0.7rem;
        padding: 0.22rem 0.55rem;
        font-family: "Cascadia Code", "Fira Code", "Consolas", monospace;
      }
      .sample-btn:hover {
        color: var(--accent);
        border-color: var(--accent);
        background: var(--accent-dim);
      }

      /* ─── Textarea ────────────────────────────────────────────── */
      textarea {
        flex: 1;
        background: var(--bg);
        color: var(--text);
        border: none;
        outline: none;
        resize: none;
        padding: 0.75rem 0.875rem;
        font-family: "Cascadia Code", "Fira Code", "Consolas", monospace;
        font-size: 0.8rem;
        line-height: 1.65;
        tab-size: 4;
      }
      textarea::placeholder {
        color: var(--text-dim);
      }

      /* ─── Output Panel ────────────────────────────────────────── */
      .output-panel {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .output-body {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding: 0.75rem 0.875rem;
      }

      .output-body::-webkit-scrollbar {
        width: 5px;
      }
      .output-body::-webkit-scrollbar-track {
        background: transparent;
      }
      .output-body::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 3px;
      }

      /* ─── Empty State ─────────────────────────────────────────── */
      .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.625rem;
        text-align: center;
        padding: 4rem 2rem;
      }

      .empty-icon {
        width: 40px;
        height: 40px;
        border-radius: 9px;
        background: var(--surface-raised);
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 0.25rem;
      }
      .empty-icon svg {
        width: 20px;
        height: 20px;
        color: var(--text-dim);
      }

      .empty-state p {
        font-size: 0.8rem;
        color: var(--text-muted);
        max-width: 260px;
        line-height: 1.6;
      }

      /* ─── Segment Index ───────────────────────────────────────── */
      .seg-index {
        padding: 0.4rem 0.875rem;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        display: flex;
        flex-wrap: wrap;
        gap: 0.28rem;
        align-items: center;
      }

      .seg-pill {
        font-size: 0.67rem;
        font-weight: 700;
        padding: 0.16rem 0.45rem;
        border-radius: 3px;
        cursor: pointer;
        font-family: "Cascadia Code", "Fira Code", "Consolas", monospace;
        border: 1px solid transparent;
        transition:
          border-color 0.12s,
          opacity 0.12s;
        display: inline-flex;
        align-items: center;
        gap: 0.18rem;
      }
      .seg-pill:hover {
        opacity: 0.8;
        border-color: rgba(128, 128, 128, 0.3);
      }

      .pill-count {
        font-size: 0.58rem;
        background: rgba(0, 0, 0, 0.18);
        padding: 0.04rem 0.26rem;
        border-radius: 2px;
      }
      [data-theme="light"] .pill-count {
        background: rgba(0, 0, 0, 0.1);
      }

      /* ─── Stats Bar ───────────────────────────────────────────── */
      .stats-bar {
        display: flex;
        gap: 0.75rem;
        align-items: center;
        font-size: 0.7rem;
        color: var(--text-muted);
      }
      .stat-item {
        display: flex;
        align-items: center;
        gap: 0.28rem;
      }
      .stat-dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--accent);
        flex-shrink: 0;
      }

      /* ─── Search ──────────────────────────────────────────────── */
      .search-wrap {
        position: relative;
        display: flex;
        align-items: center;
      }

      .search-input {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 4px;
        color: var(--text);
        font-size: 0.75rem;
        padding: 0.25rem 0.55rem 0.25rem 1.6rem;
        outline: none;
        width: 160px;
        transition: border-color 0.15s;
        font-family: inherit;
      }
      .search-input:focus {
        border-color: var(--accent);
      }
      .search-input::placeholder {
        color: var(--text-dim);
      }

      .search-icon {
        position: absolute;
        left: 0.45rem;
        color: var(--text-muted);
        font-size: 0.8rem;
        pointer-events: none;
        line-height: 1;
      }

      /* ─── Segment Card ────────────────────────────────────────── */
      .segment-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 5px;
        overflow: hidden;
        margin-bottom: 0.45rem;
      }
      .segment-card:last-child {
        margin-bottom: 0;
      }

      .segment-header {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        padding: 0.45rem 0.7rem;
        background: var(--surface-raised);
        cursor: pointer;
        user-select: none;
        border-bottom: 1px solid var(--border);
      }
      .segment-header:hover {
        background: var(--border-subtle);
      }
      [data-theme="light"] .segment-header:hover {
        background: #e6e6f0;
      }

      /* ─── Segment Tags (Dark default) ────────────────────────── */
      .seg-tag {
        font-family: "Cascadia Code", "Fira Code", "Consolas", monospace;
        font-size: 0.73rem;
        font-weight: 700;
        padding: 0.18rem 0.48rem;
        border-radius: 3px;
        min-width: 3rem;
        text-align: center;
        letter-spacing: 0.02em;
      }

      .seg-MSH {
        background: #1a3460;
        color: #7fb3ff;
      }
      .seg-MSA {
        background: #1a3460;
        color: #7fb3ff;
      }
      .seg-ORC {
        background: #162d58;
        color: #93c5fd;
      }
      .seg-PID {
        background: #163a25;
        color: #4ade80;
      }
      .seg-NK1 {
        background: #1a3d28;
        color: #6ee7b7;
      }
      .seg-AIG,
      .seg-AIL,
      .seg-AIP,
      .seg-AIS {
        background: #163a25;
        color: #4ade80;
      }
      .seg-PR1 {
        background: #1e3d1e;
        color: #86efac;
      }
      .seg-PV1,
      .seg-PV2 {
        background: #3a2810;
        color: #fb923c;
      }
      .seg-AL1 {
        background: #382610;
        color: #fdba74;
      }
      .seg-GT1 {
        background: #363410;
        color: #fde68a;
      }
      .seg-OBR {
        background: #363210;
        color: #facc15;
      }
      .seg-QRD,
      .seg-QRF {
        background: #363210;
        color: #facc15;
      }
      .seg-OBX {
        background: #103638;
        color: #22d3ee;
      }
      .seg-DG1 {
        background: #103638;
        color: #22d3ee;
      }
      .seg-SCH {
        background: #0e3634;
        color: #2dd4bf;
      }
      .seg-NTE {
        background: #281840;
        color: #c4b5fd;
      }
      .seg-RGS {
        background: #241840;
        color: #c4b5fd;
      }
      .seg-IN1,
      .seg-IN2 {
        background: #38183a;
        color: #f0abfc;
      }
      .seg-EVN {
        background: #3a1414;
        color: #f87171;
      }
      .seg-ERR {
        background: #3a1414;
        color: #f87171;
      }
      .seg-ACC {
        background: #342010;
        color: #fca5a5;
      }
      .seg-MRG {
        background: #38141e;
        color: #fda4af;
      }
      .seg-ROL {
        background: #14243a;
        color: #93c5fd;
      }
      .seg-unknown {
        background: var(--surface-raised);
        color: var(--text-muted);
      }

      /* ─── Segment Tags (Light overrides) ─────────────────────── */
      [data-theme="light"] .seg-MSH,
      [data-theme="light"] .seg-MSA {
        background: #dbeafe;
        color: #1d4ed8;
      }
      [data-theme="light"] .seg-ORC {
        background: #e0edfb;
        color: #1e40af;
      }
      [data-theme="light"] .seg-PID {
        background: #dcfce7;
        color: #15803d;
      }
      [data-theme="light"] .seg-NK1 {
        background: #d1fae5;
        color: #065f46;
      }
      [data-theme="light"] .seg-AIG,
      [data-theme="light"] .seg-AIL,
      [data-theme="light"] .seg-AIP,
      [data-theme="light"] .seg-AIS {
        background: #dcfce7;
        color: #15803d;
      }
      [data-theme="light"] .seg-PR1 {
        background: #d1fae5;
        color: #065f46;
      }
      [data-theme="light"] .seg-PV1,
      [data-theme="light"] .seg-PV2 {
        background: #ffedd5;
        color: #c2410c;
      }
      [data-theme="light"] .seg-AL1 {
        background: #fff7ed;
        color: #c2410c;
      }
      [data-theme="light"] .seg-GT1 {
        background: #fefce8;
        color: #92400e;
      }
      [data-theme="light"] .seg-OBR {
        background: #fef9c3;
        color: #92400e;
      }
      [data-theme="light"] .seg-QRD,
      [data-theme="light"] .seg-QRF {
        background: #fef9c3;
        color: #92400e;
      }
      [data-theme="light"] .seg-OBX {
        background: #cffafe;
        color: #0e7490;
      }
      [data-theme="light"] .seg-DG1 {
        background: #cffafe;
        color: #0e7490;
      }
      [data-theme="light"] .seg-SCH {
        background: #ccfbf1;
        color: #0f766e;
      }
      [data-theme="light"] .seg-NTE {
        background: #f3e8ff;
        color: #6b21a8;
      }
      [data-theme="light"] .seg-RGS {
        background: #f0e7ff;
        color: #6b21a8;
      }
      [data-theme="light"] .seg-IN1,
      [data-theme="light"] .seg-IN2 {
        background: #fce7f3;
        color: #9d174d;
      }
      [data-theme="light"] .seg-EVN {
        background: #fee2e2;
        color: #b91c1c;
      }
      [data-theme="light"] .seg-ERR {
        background: #fee2e2;
        color: #b91c1c;
      }
      [data-theme="light"] .seg-ACC {
        background: #ffedd5;
        color: #9a3412;
      }
      [data-theme="light"] .seg-MRG {
        background: #ffe4e6;
        color: #9f1239;
      }
      [data-theme="light"] .seg-ROL {
        background: #dbeafe;
        color: #1e40af;
      }
      [data-theme="light"] .seg-unknown {
        background: var(--surface-raised);
        color: var(--text-muted);
      }

      .seg-name {
        font-size: 0.8rem;
        font-weight: 500;
        flex: 1;
        color: var(--text);
      }
      .seg-count {
        font-size: 0.7rem;
        color: var(--text-muted);
        white-space: nowrap;
      }

      .seg-header-actions {
        display: flex;
        align-items: center;
        gap: 0.3rem;
      }

      .btn-icon {
        background: transparent;
        border: 1px solid transparent;
        border-radius: 3px;
        color: var(--text-muted);
        padding: 0.2rem 0.3rem;
        cursor: pointer;
        transition: all 0.12s;
        line-height: 0;
        display: inline-flex;
        align-items: center;
      }
      .btn-icon svg {
        width: 13px;
        height: 13px;
      }
      .btn-icon:hover {
        border-color: var(--border);
        color: var(--text);
        background: var(--bg);
      }

      .chevron {
        color: var(--text-muted);
        transition: transform 0.18s;
        line-height: 0;
        display: inline-flex;
        align-items: center;
        flex-shrink: 0;
      }
      .chevron svg {
        width: 12px;
        height: 12px;
      }
      .segment-card.collapsed .chevron {
        transform: rotate(-90deg);
      }
      .segment-card.collapsed .segment-body {
        display: none;
      }

      /* ─── Field Rows ──────────────────────────────────────────── */
      .segment-body {
        padding: 0;
      }

      .raw-line {
        font-family: "Cascadia Code", "Fira Code", "Consolas", monospace;
        font-size: 0.7rem;
        color: var(--text-muted);
        background: var(--bg);
        padding: 0.4rem 0.7rem;
        border-top: 1px solid var(--border);
        word-break: break-all;
        overflow-wrap: anywhere;
        display: none;
      }
      .raw-line.visible {
        display: block;
      }

      .field-row {
        display: grid;
        grid-template-columns: 2.25rem minmax(170px, 250px) 1fr;
        gap: 0;
        border-bottom: 1px solid var(--border-subtle);
        font-size: 0.78rem;
        align-items: stretch;
        min-width: 0;
      }
      .field-row:last-of-type {
        border-bottom: none;
      }
      .field-row.hidden {
        display: none;
      }
      .field-row.has-value:hover {
        background: var(--accent-dim);
      }
      .field-row.has-value:hover .copy-btn {
        opacity: 1;
      }

      .field-num {
        padding: 0.42rem 0.4rem;
        color: var(--text-dim);
        font-family: "Cascadia Code", "Fira Code", monospace;
        font-size: 0.67rem;
        text-align: center;
        background: var(--bg);
        display: flex;
        align-items: center;
        justify-content: center;
        border-right: 1px solid var(--border-subtle);
        flex-shrink: 0;
      }

      .field-name {
        padding: 0.42rem 0.6rem;
        color: var(--text-muted);
        border-right: 1px solid var(--border-subtle);
        font-size: 0.82rem;
        display: flex;
        align-items: center;
        line-height: 1.4;
        word-break: break-word;
        min-width: 0;
      }

      .field-value {
        padding: 0.42rem 0.6rem;
        font-family: "Cascadia Code", "Fira Code", "Consolas", monospace;
        font-size: 0.82rem;
        word-break: break-all;
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 0.2rem;
        min-width: 0;
        overflow-wrap: anywhere;
        position: relative;
      }
      .field-value.empty {
        color: var(--text-dim);
        font-style: italic;
        font-family: inherit;
        font-size: 0.72rem;
      }

      /* ─── Copy Button ─────────────────────────────────────────── */
      .copy-btn {
        position: absolute;
        right: 0.35rem;
        top: 50%;
        transform: translateY(-50%);
        opacity: 0;
        background: var(--surface-raised);
        border: 1px solid var(--border);
        border-radius: 3px;
        color: var(--text-muted);
        padding: 0.18rem 0.28rem;
        cursor: pointer;
        transition: all 0.12s;
        line-height: 0;
        display: inline-flex;
        align-items: center;
      }
      .copy-btn:hover {
        color: var(--text);
        border-color: var(--accent);
      }
      .copy-btn.copied {
        color: var(--green);
        border-color: var(--green);
        opacity: 1;
      }

      /* ─── Components ──────────────────────────────────────────── */
      .component {
        display: inline-flex;
        align-items: center;
        gap: 0.18rem;
      }
      .component-sep {
        color: var(--border);
        font-size: 0.85em;
      }
      .component-val {
        color: var(--text);
      }

      .component-label {
        font-size: 0.62rem;
        color: var(--text-muted);
        background: var(--surface-raised);
        border: 1px solid var(--border-subtle);
        padding: 0.03rem 0.26rem;
        border-radius: 2px;
        font-family: inherit;
      }

      .repeat-group {
        display: flex;
        flex-direction: column;
        gap: 0.16rem;
        width: 100%;
      }
      .repeat-item {
        display: flex;
        align-items: center;
        gap: 0.32rem;
      }

      .repeat-badge {
        font-size: 0.6rem;
        color: var(--text-muted);
        background: var(--surface-raised);
        border: 1px solid var(--border);
        padding: 0.06rem 0.28rem;
        border-radius: 2px;
        white-space: nowrap;
        font-family: "Cascadia Code", "Fira Code", monospace;
      }

      /* ─── Error Box ───────────────────────────────────────────── */
      .error-box {
        background: rgba(239, 68, 68, 0.07);
        border: 1px solid rgba(239, 68, 68, 0.22);
        border-radius: 5px;
        padding: 0.75rem 0.875rem;
        color: var(--red);
        font-size: 0.8rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      /* ─── Toast ───────────────────────────────────────────────── */
      .toast {
        position: fixed;
        bottom: 1.125rem;
        right: 1.125rem;
        background: var(--surface);
        border: 1px solid var(--green);
        color: var(--green);
        font-size: 0.75rem;
        font-weight: 500;
        padding: 0.4rem 0.8rem;
        border-radius: 4px;
        opacity: 0;
        transform: translateY(6px);
        transition: all 0.2s;
        pointer-events: none;
        z-index: 100;
      }
      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }

      /* ─── Responsive ──────────────────────────────────────────── */
      @media (max-width: 600px) {
        .panel {
          height: 35vh;
        }
        .field-row {
          grid-template-columns: 2rem minmax(110px, 150px) 1fr;
        }
        .search-input {
          width: 120px;
        }
      }
    </style>

          document.documentElement.dataset.theme = "light";

      function toggleTheme() {
        const current = document.documentElement.dataset.theme || "dark";

      // ─── HL7 Escape Decoding ─────────────────────────────────────────────────────

      function decodeHL7Escape(str, d) {
        if (!str || !str.includes(d.escChar)) return str;
        // Escape the escape character for use in RegExp
        const e = d.escChar.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        return str
          .replace(new RegExp(`${e}F${e}`, "g"), d.fieldSep)
          .replace(new RegExp(`${e}S${e}`, "g"), d.compSep)
          .replace(new RegExp(`${e}R${e}`, "g"), d.repSep)
          .replace(new RegExp(`${e}T${e}`, "g"), d.subSep)
          .replace(new RegExp(`${e}E${e}`, "g"), d.escChar)
          .replace(new RegExp(`${e}X([0-9A-Fa-f]+)${e}`, "g"), (_, hex) => {
            const cp = parseInt(hex, 16);
            return cp <= 0x10ffff ? String.fromCodePoint(cp) : "";
          })
          .replace(new RegExp(`${e}[HN]${e}`, "g"), "");
      }

      // ─── Parser ──────────────────────────────────────────────────────────────────

      function parseHL7(raw) {
        // Strip MLLP framing: \x0B (VT, start block) and \x1C\r (FS+CR, end block)
        let text = raw.replace(/^\x0B/, "").replace(/\x1C\r?$/, "");
        // Normalize line endings to \r
        text = text.replace(/\r\n/g, "\r").replace(/\n/g, "\r").trim();

        const segments = text.split("\r").filter((s) => s.trim().length > 0);
        if (segments.length === 0) throw new Error("Keine Segmente gefunden.");
        if (segments.length > 10000)
          throw new Error("Nachricht zu groß – mehr als 10.000 Segmente.");

        const firstSeg = segments[0];
        if (!firstSeg.startsWith("MSH"))
          throw new Error("Erstes Segment muss MSH sein.");
        if (firstSeg.length < 8)
          throw new Error("MSH-Segment zu kurz – Kodierungszeichen fehlen.");

        // Delimiters from MSH
        const fieldSep = firstSeg[3] || "|";
        const encodingChars = firstSeg.substring(4, 8);
        const compSep = encodingChars[0] || "^";
        const repSep = encodingChars[1] || "~";
        const escChar = encodingChars[2] || "\\";
        const subSep = encodingChars[3] || "&";

        _delimiters = { fieldSep, compSep, repSep, escChar, subSep };

        return segments.map((seg) =>
          parseSegment(seg, fieldSep, compSep, repSep, escChar, subSep),
        );
      }

      function parseSegment(seg, fieldSep, compSep, repSep, escChar, subSep) {
        const name = seg.substring(0, 3);
        const parts = seg.split(fieldSep);
        const def =
          SEGMENTS[name] ||
          (name.startsWith("Z")
            ? { name: `Z-Segment (${name})`, fields: [] }
            : { name: "Unbekanntes Segment", fields: [] });

        let fields = [];

        if (name === "MSH") {
          // MSH.1 = field separator character
          fields.push({
            num: 1,
            name: def.fields[0] || "Feldtrennzeichen",
            value: [[{ val: fieldSep, label: null }]],
            raw: fieldSep,
          });
          // MSH.2 = encoding characters — always parts[1]
          fields.push({
            num: 2,
            name: def.fields[1] || "Kodierungszeichen",
            value: [[{ val: parts[1] || "", label: null }]],
            raw: parts[1] || "",
          });
          // MSH.3+ — parts[2] = MSH.3, parts[3] = MSH.4, …
          for (let i = 2; i < parts.length; i++) {
            const raw = parts[i];
            const fieldNum = i + 1;
            fields.push({
              num: fieldNum,
              name: def.fields[fieldNum - 1] || `Feld ${fieldNum}`,
              value: parseFieldValue(
                raw,
                compSep,
                repSep,
                subSep,
                `${name}.${fieldNum}`,
              ),
              raw,
            });
          }
        } else {
          for (let i = 1; i < parts.length; i++) {
            const raw = parts[i];
            fields.push({
              num: i,
              name: def.fields[i - 1] || `Feld ${i}`,
              value: parseFieldValue(
                raw,
                compSep,
                repSep,
                subSep,
                `${name}.${i}`,
              ),
              raw,
            });
          }
        }

        return { name, def, fields, rawLine: seg };
      }

      function parseFieldValue(raw, compSep, repSep, subSep, fieldKey) {
        if (!raw) return null;
        const reps = raw.split(repSep);
        return reps.map((rep) => parseComponents(rep, compSep, fieldKey));
      }

      function parseComponents(rep, compSep, fieldKey) {
        const comps = rep.split(compSep);
        const compDefs = COMPONENTS[fieldKey] || [];
        return comps.map((c, i) => ({
          val: c,
          label: compDefs[i] || (comps.length > 1 ? `Komp. ${i + 1}` : null),
        }));
      }

      // ─── Renderer ────────────────────────────────────────────────────────────────

      function renderSegments(segments) {
        const output = document.getElementById("output");
        const index = document.getElementById("seg-index");
        const statsBar = document.getElementById("stats-bar");

        output.innerHTML = "";
        index.innerHTML = "";
        index.style.display = "flex";

        const totalFields = segments.reduce(
          (a, s) => a + s.fields.filter((f) => f.raw).length,
          0,
        );
        statsBar.innerHTML = `
    <div class="stat-item"><div class="stat-dot"></div>${segments.length} Segmente</div>
    <div class="stat-item"><div class="stat-dot" style="background:var(--green)"></div>${totalFields} Felder</div>
  `;

        // Count occurrences per segment type for numbered pills
        const typeCounts = {};
        const typeOccurrence = {};
        segments.forEach((s) => {
          typeCounts[s.name] = (typeCounts[s.name] || 0) + 1;
        });

        segments.forEach((seg, idx) => {
          typeOccurrence[seg.name] = typeOccurrence[seg.name] || 0;
          const occurrence = typeOccurrence[seg.name]++;
          const count = typeCounts[seg.name];

          // Index pill
          const pill = document.createElement("span");
          pill.className = `seg-pill seg-${seg.name}`;
          pill.style.cssText = getSegStyle(seg.name);
          pill.title =
            seg.def.name + (count > 1 ? ` (${occurrence + 1}/${count})` : "");
          pill.innerHTML =
            escHtml(seg.name) +
            (count > 1
              ? `<span class="pill-count">${occurrence + 1}</span>`
              : "");
          pill.onclick = () =>
            document
              .getElementById(`seg-${idx}`)
              .scrollIntoView({ behavior: "smooth", block: "start" });
          index.appendChild(pill);

          // Segment card
          const card = document.createElement("div");
          card.className = "segment-card";
          card.id = `seg-${idx}`;

          const nonEmpty = seg.fields.filter((f) => f.raw).length;

          const headerDiv = document.createElement("div");
          headerDiv.className = "segment-header";
          headerDiv.innerHTML = `
      <span class="seg-tag seg-${escHtml(seg.name)}">${escHtml(seg.name)}</span>
      <span class="seg-name">${escHtml(seg.def.name)}</span>
      <span class="seg-count">${nonEmpty} Felder</span>
      <div class="seg-header-actions">
        <button class="btn-icon" title="Rohzeile anzeigen/verbergen" onclick="event.stopPropagation();toggleRaw(this)"><svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="4,2 1,6.5 4,11"/><polyline points="9,2 12,6.5 9,11"/></svg></button>
      </div>
      <span class="chevron"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,4 6,8 10,4"/></svg></span>
    `;
          headerDiv.addEventListener("click", () =>
            card.classList.toggle("collapsed"),
          );

          const bodyDiv = document.createElement("div");
          bodyDiv.className = "segment-body";
          bodyDiv.innerHTML = seg.fields.map((f) => renderField(f)).join("");

          const rawDiv = document.createElement("div");
          rawDiv.className = "raw-line";
          rawDiv.textContent = seg.rawLine;
          bodyDiv.appendChild(rawDiv);

          card.appendChild(headerDiv);
          card.appendChild(bodyDiv);
          output.appendChild(card);
        });
      }

      function getSegStyle(name) {
        if (SEGMENTS[name]) return "";
        if (name.startsWith("Z")) return "background:#2a1e3f;color:#c4b5fd;";
        return "background:#252525;color:#888;";
      }

      function renderField(field) {
        const hasValue = field.raw && field.raw.length > 0;
        const cls = hasValue ? "field-row has-value" : "field-row";

        let valueHtml;
        if (!hasValue) {
          valueHtml = '<span class="field-value empty">—</span>';
        } else {
          const reps = field.value;
          const rawEscaped = escHtml(field.raw);
          const copyBtn = `<button class="copy-btn" data-raw="${escHtml(field.raw)}" onclick="copyValue(this)" title="In Zwischenablage kopieren"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="3.5" width="7" height="7" rx="1"/><path d="M1.5 8V1.5h6.5"/></svg></button>`;
          if (reps.length === 1) {
            valueHtml = `<div class="field-value">${renderComponents(reps[0])}${copyBtn}</div>`;
          } else {
            const repsHtml = reps
              .map(
                (rep, i) =>
                  `<div class="repeat-item">
          <span class="repeat-badge">[${i + 1}]</span>
          ${renderComponents(rep)}
        </div>`,
              )
              .join("");
            valueHtml = `<div class="field-value"><div class="repeat-group">${repsHtml}</div>${copyBtn}</div>`;
          }
        }

        const searchKey = (field.name + " " + (field.raw || "")).toLowerCase();

        return `
    <div class="${cls}" data-search="${escHtml(searchKey)}">
      <div class="field-num">${field.num}</div>
      <div class="field-name">${escHtml(field.name)}</div>
      ${valueHtml}
    </div>
  `;
      }

      function renderComponents(comps) {
        const cs = _delimiters.compSep;
        if (comps.length === 1 && !comps[0].label) {
          return `<span class="component-val">${escHtml(decodeHL7Escape(comps[0].val, _delimiters))}</span>`;
        }
        return comps
          .filter((c) => c.val || c.label)
          .map(
            (c, i) => `
    <span class="component">
      ${i > 0 ? `<span class="component-sep">${escHtml(cs)}</span>` : ""}
      ${c.val ? `<span class="component-val">${escHtml(decodeHL7Escape(c.val, _delimiters))}</span>` : ""}
      ${c.label && c.val ? `<span class="component-label">${escHtml(c.label)}</span>` : ""}
    </span>
  `,
          )
          .join("");
      }

      function escHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      // ─── Actions ─────────────────────────────────────────────────────────────────

      function parse() {
        const raw = document.getElementById("input").value.trim();
        const output = document.getElementById("output");
        const index = document.getElementById("seg-index");
        const statsBar = document.getElementById("stats-bar");
        const search = document.getElementById("search");
        if (search) search.value = "";

        if (!raw) {
          output.innerHTML =
            '<div class="error-box">⚠ Bitte eine HL7 Nachricht eingeben.</div>';
          index.style.display = "none";
          statsBar.innerHTML = "";
          return;
        }

        try {
          const segments = parseHL7(raw);
          renderSegments(segments);
        } catch (e) {
          output.innerHTML = `<div class="error-box">⚠ Fehler: ${escHtml(e.message)}</div>`;
          index.style.display = "none";
          statsBar.innerHTML = "";
        }
      }

      function clearInput() {
        document.getElementById("input").value = "";
        document.getElementById("output").innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" xmlns="http://www.w3.org/2000/svg">

          <line x1="8" y1="8"  x2="16" y2="8"/>
          <line x1="8" y1="12" x2="13" y2="12"/>
          <line x1="8" y1="16" x2="14" y2="16"/>
        </svg>
      </div>
      <p>HL7 Nachricht eingeben und auf <strong>Parsen</strong> klicken, um die Segmente zu analysieren.</p>
    </div>`;
        document.getElementById("seg-index").style.display = "none";
        document.getElementById("stats-bar").innerHTML = "";
        const search = document.getElementById("search");
        if (search) search.value = "";
      }

      function loadSample(type) {
        document.getElementById("input").value = SAMPLES[type];
        parse();
      }

      function collapseAll() {
        document
          .querySelectorAll(".segment-card")
          .forEach((c) => c.classList.add("collapsed"));
      }

      function expandAll() {
        document
          .querySelectorAll(".segment-card")
          .forEach((c) => c.classList.remove("collapsed"));
      }

      function toggleRaw(btn) {
        const rawLine = btn.closest(".segment-card").querySelector(".raw-line");
        if (rawLine) rawLine.classList.toggle("visible");
      }

      function filterFields(query) {
        const q = query.trim().toLowerCase();
        document.querySelectorAll(".segment-card").forEach((card) => {
          let cardVisible = false;
          card.querySelectorAll(".field-row").forEach((row) => {
            if (!q) {
              row.classList.remove("hidden");
              cardVisible = true;
            } else {
              const match = (row.dataset.search || "").includes(q);
              row.classList.toggle("hidden", !match);
              if (match) cardVisible = true;
            }
          });
          card.style.display = !q || cardVisible ? "" : "none";
          if (q && cardVisible) card.classList.remove("collapsed");
        });
      }

      let _toastTimer = null;
      function copyValue(btn) {
        const raw = btn.dataset.raw;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard
            .writeText(raw)
            .then(() => _showCopied(btn))
            .catch(() => _fallbackCopy(btn, raw));
        } else {
          _fallbackCopy(btn, raw);
        }
      }

      function _fallbackCopy(btn, raw) {
        const ta = document.createElement("textarea");
        ta.value = raw;
        ta.style.cssText = "position:fixed;top:-9999px;left:-9999px;opacity:0";
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        try {
          document.execCommand("copy");
          _showCopied(btn);
        } catch (e) {
          btn.title = "Kopieren fehlgeschlagen";
        }
        document.body.removeChild(ta);
      }

      function _showCopied(btn) {
        btn.classList.add("copied");
        setTimeout(() => btn.classList.remove("copied"), 1200);
        const toast = document.getElementById("toast");
        toast.classList.add("show");
        clearTimeout(_toastTimer);
        _toastTimer = setTimeout(() => toast.classList.remove("show"), 1800);
      }

      // ─── Keyboard Shortcut ───────────────────────────────────────────────────────

      document.addEventListener("keydown", (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === "Enter") parse();
      });
    </script>
  </body>
</html>
